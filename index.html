<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EFT · Kappa Quest Planner</title>
<style>
  :root{
    --bg:#101109; --bg2:#181a12; --panel:#1d1f16; --line:#33362a; --line2:#43473a;
    --text:#e9e7da; --muted:#9a9c85; --dim:#6f7160;
    --gold:#e8c15a; --gold2:#ffe08a; --goldsoft:#6d5f2a;
    --good:#63c088; --junk:#5b5d50;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:"Segoe UI",Roboto,system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
  #app{display:flex;flex-direction:column;height:100%}

  header{display:flex;align-items:center;gap:16px;padding:8px 14px;background:linear-gradient(#20221a,#15170f);border-bottom:1px solid var(--line);flex-wrap:wrap}
  .brand{font-size:15px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
  .brand b{color:var(--gold)}

  /* big mode switch */
  .switch{display:flex;border:1px solid var(--goldsoft);border-radius:9px;overflow:hidden;background:#0e0f0a}
  .switch button{padding:9px 16px;border:0;background:transparent;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;line-height:1.1;text-align:center}
  .switch button small{display:block;font-size:9px;font-weight:600;letter-spacing:.5px;opacity:.7}
  .switch button.on{background:linear-gradient(#e8c15a,#caa63f);color:#161206;text-shadow:none}
  .switch button.on small{opacity:.85}
  .switch button:not(.on):hover{color:var(--gold)}
  .langsw{display:flex;border:1px solid var(--line2);border-radius:8px;overflow:hidden}
  .langsw button{padding:7px 11px;border:0;background:#0e0f0a;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer}
  .langsw button.on{background:var(--gold);color:#161206}
  .langsw button:not(.on):hover{color:var(--gold)}

  .stats{display:flex;gap:14px;font-size:12px;color:var(--muted);flex-wrap:wrap}
  .stats b{color:var(--text)} .stats .g{color:var(--gold)}
  .spacer{flex:1}
  .ctrl{display:flex;align-items:center;gap:7px;font-size:12px}
  input[type=search]{background:var(--bg2);border:1px solid var(--line);color:var(--text);padding:7px 9px;border-radius:6px;width:170px;font-size:12px}
  button.btn{background:var(--bg2);border:1px solid var(--line);color:var(--text);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px}
  button.btn:hover{border-color:var(--gold);color:var(--gold)}

  /* filter bar */
  #bar{display:flex;align-items:center;gap:14px;padding:7px 14px;background:var(--bg2);border-bottom:1px solid var(--line);flex-wrap:wrap;font-size:12px}
  .chk{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
  .chk input{accent-color:var(--gold)}
  .sw{display:inline-block;width:11px;height:11px;border-radius:3px;border:1px solid #0006}
  .sep{width:1px;height:20px;background:var(--line)}
  #minxpv{color:var(--gold);font-weight:600;min-width:52px;display:inline-block}
  input[type=range]{accent-color:var(--gold);width:130px}

  /* new-collector requirement strip */
  #reqstrip{display:none;align-items:center;gap:8px;padding:6px 14px;background:linear-gradient(90deg,rgba(232,193,90,.12),rgba(232,193,90,.02));border-bottom:1px solid var(--goldsoft);font-size:11.5px;color:#e9dcae;flex-wrap:wrap}
  #reqstrip b{color:var(--gold2)} #reqstrip .pill{border:1px solid var(--goldsoft);border-radius:20px;padding:2px 9px;background:rgba(0,0,0,.2)}

  #stage{flex:1;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 35%,#181a12,#0b0c07 92%);cursor:grab;touch-action:none}
  #stage.drag{cursor:grabbing}
  svg{width:100%;height:100%;display:block}

  .colhead text{font-weight:700;font-size:13px}
  .colhead .cnt{font-size:10px;fill:var(--muted);font-weight:600}
  .collane{fill:rgba(255,255,255,.015);stroke:var(--line);stroke-width:1}

  #edges path{fill:none;stroke:#4a4d3a;stroke-width:1.3;opacity:0;pointer-events:none}
  body.links #edges path{opacity:.09}
  #edges path.hl{opacity:1;stroke:var(--gold);stroke-width:2.2}

  .node{cursor:pointer}
  .node rect.bg{stroke-width:1.4}
  .node .bar{}
  .node text{pointer-events:none;dominant-baseline:middle}
  .node .nm{font-size:11px;fill:var(--text)}
  .node .meta{font-size:9px;fill:var(--muted)}
  /* status styles */
  .node.normal rect.bg{fill:#20221a;stroke:#3d4032}
  .node.req rect.bg{fill:rgba(232,193,90,.16);stroke:var(--gold)}
  .node.req .nm{fill:var(--gold2)}
  .node.seed rect.bg{fill:rgba(232,193,90,.30);stroke:var(--gold2);stroke-width:2}
  .node.junk{opacity:.5}
  .node.junk rect.bg{fill:#161811;stroke:#34362b;stroke-dasharray:3 3}
  .node.junk .nm{fill:var(--dim)}
  .node.dim{opacity:.10}
  .node.sel rect.bg{stroke:#fff;stroke-width:2.5}
  .hidden{display:none}

  #info{position:absolute;top:12px;right:12px;width:300px;background:rgba(24,26,19,.98);border:1px solid var(--line2);border-radius:11px;padding:14px 16px;font-size:12.5px;box-shadow:0 10px 34px rgba(0,0,0,.55);display:none}
  #info h2{margin:0 0 6px;font-size:15px;line-height:1.25;padding-right:16px}
  #info .badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;margin:0 4px 8px 0}
  #info .b-req{background:var(--gold);color:#161206} #info .b-seed{background:var(--gold2);color:#161206}
  #info .b-junk{background:var(--junk);color:#111} #info .b-norm{background:#2c2f24;color:var(--muted)}
  #info .row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed #2a2c22}
  #info .g{color:var(--gold);font-weight:600}
  #info .row span:first-child{color:var(--muted)}
  #info .close{position:absolute;top:8px;right:11px;cursor:pointer;color:var(--muted);font-size:16px}
  #info .close:hover{color:var(--text)}
  #hint{position:absolute;bottom:9px;left:14px;font-size:11px;color:var(--dim);pointer-events:none}
  #zoombox{position:absolute;bottom:9px;right:14px;display:flex;gap:6px}
  #zoombox button{width:30px;height:30px;font-size:15px}

  /* ---------- mobile ---------- */
  @media (max-width:820px){
    html,body{-webkit-tap-highlight-color:transparent}
    header{gap:8px;padding:7px 10px}
    .brand{font-size:13px;width:100%;order:-1}
    .switch{flex:1} .switch button{flex:1;padding:9px 8px;font-size:12px}
    .langsw button{padding:9px 13px;font-size:13px}
    .stats{font-size:11px;gap:10px;width:100%;order:5}
    .spacer{display:none}
    .ctrl{flex:1} input[type=search]{width:100%}
    #fit{padding:9px 12px}
    #reqstrip{font-size:11px;padding:7px 10px}
    #bar{gap:11px 16px;padding:9px 10px}
    .chk{padding:4px 0;font-size:13px}
    .chk input[type=checkbox]{width:22px;height:22px}
    input[type=range]{width:120px;height:28px}
    .sep{display:none}
    #legend{width:100%;gap:8px}
    #legend .chk{font-size:12px}
    #info{left:8px;right:8px;top:auto;bottom:8px;width:auto;max-height:48vh;overflow:auto}
    #hint{display:none}
    #zoombox button{width:42px;height:42px;font-size:19px}
  }
</style>

<div id="app">
  <header>
    <span class="brand">EFT · <b>Kappa</b> Planner</span>
    <div class="switch" id="switch">
      <button data-mode="old">1.0.6.5<small data-t="old">СТАРЫЙ</small></button>
      <button data-mode="new" class="on">1.1.0.0<small data-t="new">НОВЫЙ</small></button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="spacer"></div>
    <div class="langsw" id="langsw">
      <button data-lang="ru" class="on">RU</button>
      <button data-lang="en">EN</button>
    </div>
    <div class="ctrl"><input type="search" id="search" data-tph="search" placeholder="Поиск квеста…" autocomplete="off"></div>
    <button class="btn" id="fit" data-t="fit">Вписать</button>
  </header>

  <div id="reqstrip"></div>

  <div id="bar">
    <label class="chk"><input type="checkbox" id="f-req" checked><span class="sw" style="background:var(--gold)"></span><span data-t="required">Обязательные</span></label>
    <label class="chk"><input type="checkbox" id="f-normal" checked><span class="sw" style="background:#3d4032"></span><span data-t="normal">Обычные</span></label>
    <label class="chk"><input type="checkbox" id="f-junk"><span class="sw" style="background:var(--junk);border-style:dashed"></span><span data-t="junk">Мусор</span></label>
    <span class="sep"></span>
    <label class="chk"><span data-t="minxp">Мин. XP:</span> <input type="range" id="minxp" min="0" max="50000" step="1000" value="0"><span id="minxpv">0</span></label>
    <span class="sep"></span>
    <label class="chk"><span data-t="unlocks">Открывает ≥</span> <input type="range" id="minunlock" min="0" max="20" step="1" value="0" style="width:90px"><span id="minunlockv" style="color:var(--gold);font-weight:600">0</span></label>
    <span class="sep"></span>
    <label class="chk"><input type="checkbox" id="links"><span data-t="links">Показать связи</span></label>
    <span class="spacer" style="flex:1"></span>
    <div id="legend" style="display:flex;gap:5px;flex-wrap:wrap"></div>
  </div>

  <div id="stage">
    <svg id="svg"><g id="view"><g id="lanes"></g><g id="edges"></g><g id="nodes"></g></g></svg>
    <div id="info"><span class="close" id="infoClose">✕</span><div id="infoBody"></div></div>
    <div id="hint" data-t="hint">колесо — зум · тащить — панорама · навести/кликнуть квест — подсветить цепочку</div>
    <div id="zoombox"><button class="btn" id="zout">－</button><button class="btn" id="zin">＋</button></div>
  </div>
</div>

      required:"Required",normal:"Normal",junk:"Junk",minxp:"Min XP:",unlocks:"Unlocks ≥",links:"Show links",
      hint:"wheel — zoom · drag — pan · hover/click a quest — highlight its chain",
      s_req:"Required",s_reqxp:"Required XP",s_junk:"Junk",s_total:"Total",q:"q.",
      collector:"Collector 1.1.0.0:",fencerep:"Fence rep 3",level:"Level 40",keys:"★ 4 key quests →",chain:"in chain",
      b_req:"REQUIRED",b_seed:"★ COLLECTOR KEY",b_junk:"JUNK · skippable",b_norm:"optional",
      i_trader:"Trader",i_xp:"XP",i_lvl:"Min level",i_map:"Map",i_pre:"Direct prereqs",i_ch:"Chain total",i_chxp:"Chain XP",i_unl:"Unlocks next"}
};
const t=k=>L[LANG][k];
const dn=d=>LANG==="ru"?(d.nameRu||d.name):d.name;

const TRADER_ORDER=["Prapor","Therapist","Skier","Peacekeeper","Mechanic","Ragman","Jaeger","Ref","Fence","BTR Driver","Lightkeeper"];
const TC={Prapor:"#e05c5c",Therapist:"#59b3a9",Skier:"#6c8cff",Peacekeeper:"#4dabf7",Mechanic:"#b18cff",Ragman:"#f0883e",Jaeger:"#7fbf5a",Fence:"#9aa0a6",Ref:"#e07ac0","BTR Driver":"#c9a45b",Lightkeeper:"#ffd166"};
const traders=TRADER_ORDER.filter(t=>DATA.some(d=>d.trader===t)).concat([...new Set(DATA.map(d=>d.trader))].filter(t=>!TRADER_ORDER.includes(t)));

const COL_W=200, COL_GAP=30, NODE_W=184, NODE_H=30, ROW_H=34, TOP=54, HEAD=40, GROUP_GAP=12;
const JUNK_XP=12000;

// ---- graph relations (mode-independent) ----
const childMap=new Map(DATA.map(d=>[d.id,[]]));
DATA.forEach(d=>d.requires.forEach(r=>childMap.get(r)&&childMap.get(r).push(d.id)));
function ancestors(id){const s=new Set(),st=[id];while(st.length){const c=st.pop();byId.get(c).requires.forEach(r=>{if(byId.has(r)&&!s.has(r)){s.add(r);st.push(r);}});}return s;}
function descendants(id){const s=new Set(),st=[id];while(st.length){const c=st.pop();childMap.get(c).forEach(k=>{if(!s.has(k)){s.add(k);st.push(k);}});}return s;}
const depth=new Map();
(function(){function dep(id){if(depth.has(id))return depth.get(id);depth.set(id,0);let m=0;byId.get(id).requires.forEach(r=>byId.has(r)&&(m=Math.max(m,dep(r)+1)));depth.set(id,m);return m;}DATA.forEach(d=>dep(d.id));})();
const descCount=new Map(DATA.map(d=>[d.id,descendants(d.id).size]));

// Order one trader's quests: primarily top-down by the level a quest opens,
// but keep named quest-lines (e.g. "Gunsmith - Part 1..25", "Test Drive - Part 1..5")
// contiguous as a block placed at the level the line starts.
function orderTraderList(list){
  const base=d=>d.name.split(/\s[-–—]\s/)[0].trim();          // "Test Drive - Part 2" -> "Test Drive"
  const partNum=d=>{const m=d.name.match(/part\s+(\d+)/i);return m?+m[1]:0;};
  const set=new Set(list.map(d=>d.id));
  const dC=new Map();
  function td(id){if(dC.has(id))return dC.get(id);dC.set(id,0);let m=0;byId.get(id).requires.forEach(r=>{if(set.has(r))m=Math.max(m,td(r)+1);});dC.set(id,m);return m;}
  const groups=new Map();
  list.forEach(d=>{const b=base(d);if(!groups.has(b))groups.set(b,[]);groups.get(b).push(d);});
  const blockLevel=new Map(), groupOf=new Map(), isSeries=new Set();
  groups.forEach((arr,b)=>{blockLevel.set(b,Math.min(...arr.map(d=>d.minLevel)));if(arr.length>1)isSeries.add(b);arr.forEach(d=>groupOf.set(d.id,b));});
  const sorted=list.slice().sort((a,b)=>{
    const ba=base(a), bb=base(b);
    if(ba!==bb){const dl=blockLevel.get(ba)-blockLevel.get(bb);if(dl)return dl;return ba.localeCompare(bb);}
    return a.minLevel-b.minLevel||partNum(a)-partNum(b)||td(a.id)-td(b.id)||dn(a).localeCompare(dn(b));
  });
  return {list:sorted, groupOf, isSeries};
}

// ---- NEW collector required closure ----
const SEED_NAMES=["chemical - part 4","a shooter born in heaven","the tarkov shooter - part 4","sew it good - part 4"];
const norm=s=>s.toLowerCase().replace(/[–—-]/g,"-");
const seedIds=new Set(DATA.filter(d=>SEED_NAMES.includes(norm(d.name))).map(d=>d.id));
const newReq=new Set();
seedIds.forEach(id=>{newReq.add(id);ancestors(id).forEach(a=>newReq.add(a));});

// ---- mode / status ----
let MODE="new";
function isReq(d){ return MODE==="old" ? !!d.kappa : newReq.has(d.id); }
function isJunk(d){ return !isReq(d) && descCount.get(d.id)===0 && d.exp<JUNK_XP; }
function status(d){ if(isReq(d)) return seedIds.has(d.id)&&MODE==="new" ? "seed":"req"; if(isJunk(d)) return "junk"; return "normal"; }

// ---- filter state ----
const traderOn=new Set(traders);
const F={req:true,normal:true,junk:false,minxp:0,minunlock:0};

// ---- legend (trader toggle) ----
const legend=document.getElementById('legend');
traders.forEach(t=>{const el=document.createElement('div');el.className='chk';el.style.cursor='pointer';el.style.opacity=1;
  el.innerHTML=`<span class="sw" style="background:${TC[t]||'#888'}"></span>${t}`;
  el.onclick=()=>{if(traderOn.has(t)){traderOn.delete(t);el.style.opacity=.4;}else{traderOn.add(t);el.style.opacity=1;}render();};
  legend.appendChild(el);});

// ---- stats + req strip ----
function updateStats(){
  const req=DATA.filter(isReq), reqXP=req.reduce((s,d)=>s+d.exp,0), junk=DATA.filter(isJunk).length;
  document.getElementById('stats').innerHTML=
    `${t('s_req')}: <b class="g">${req.length}</b> · ${t('s_junk')}: <b>${junk}</b> · ${t('s_total')}: <b>${DATA.length}</b>`;
  const strip=document.getElementById('reqstrip');
  if(MODE==="new"){
    strip.style.display='flex';
    strip.innerHTML=`<b>${t('collector')}</b>`+
      `<span class="pill">LL4: Therapist · Prapor · Peacekeeper · Mechanic · Jaeger · Skier · Ragman</span>`+
      `<span class="pill">${t('fencerep')}</span><span class="pill">${t('level')}</span>`+
      `<span class="pill">${t('keys')} ${newReq.size} ${t('chain')}</span>`;
  } else strip.style.display='none';
}

// ---- LAYOUT + RENDER ----
const gLanes=document.getElementById('lanes'),gEdges=document.getElementById('edges'),gNodes=document.getElementById('nodes');
const nodeEls=new Map(); let edgeEls=[]; let LW=0,LH=0;
function visible(d){
  if(!traderOn.has(d.trader))return false;
  const st=status(d);
  if(st==="req"||st==="seed") return F.req;
  if(st==="junk") return F.junk;
  if(!F.normal) return false;
  if(d.exp<F.minxp) return false;
  if(descCount.get(d.id)<F.minunlock) return false;
  return true;
}
function render(){
  gLanes.innerHTML='';gEdges.innerHTML='';gNodes.innerHTML='';nodeEls.clear();edgeEls=[];
  const pos=new Map(); let maxColH=0;
  traders.forEach((tr,ci)=>{
    const x=ci*(COL_W+COL_GAP);
    const {list,groupOf,isSeries}=orderTraderList(DATA.filter(d=>d.trader===tr&&visible(d)));
    // positions: named quest-lines stay grouped; gap only around real series
    let y=TOP, prev=null;
    list.forEach(d=>{const g=groupOf.get(d.id);
      if(prev!==null&&g!==prev&&(isSeries.has(g)||isSeries.has(prev)))y+=GROUP_GAP;
      pos.set(d.id,{x,y});y+=ROW_H;prev=g;});
    const colBottom=list.length?y:TOP+ROW_H; maxColH=Math.max(maxColH,colBottom);
    // lane bg + header
    const laneH=colBottom-(TOP-HEAD)+6;
    const lane=document.createElementNS(SVGNS,'rect');
    lane.setAttribute('class','collane');lane.setAttribute('x',x-6);lane.setAttribute('y',TOP-HEAD+4);
    lane.setAttribute('width',NODE_W+12);lane.setAttribute('height',laneH);lane.setAttribute('rx',10);gLanes.appendChild(lane);
    const hg=document.createElementNS(SVGNS,'g');hg.setAttribute('class','colhead');
    const dot=document.createElementNS(SVGNS,'rect');dot.setAttribute('x',x);dot.setAttribute('y',TOP-HEAD+10);dot.setAttribute('width',6);dot.setAttribute('height',18);dot.setAttribute('rx',2);dot.setAttribute('fill',TC[tr]||'#888');hg.appendChild(dot);
    const ht=document.createElementNS(SVGNS,'text');ht.setAttribute('x',x+13);ht.setAttribute('y',TOP-HEAD+24);ht.setAttribute('fill',TC[tr]||'#ccc');ht.textContent=tr;hg.appendChild(ht);
    const hc=document.createElementNS(SVGNS,'text');hc.setAttribute('class','cnt');hc.setAttribute('x',x+13);hc.setAttribute('y',TOP-HEAD+37);hc.textContent=`${list.length} ${t('q')}`;hg.appendChild(hc);
    gLanes.appendChild(hg);
  });
  // edges (only between visible)
  DATA.forEach(d=>{ if(!pos.has(d.id))return;
    d.requires.forEach(r=>{ if(!pos.has(r))return;
      const a=pos.get(r),b=pos.get(d.id);
      const x1=a.x+NODE_W/2,y1=a.y+NODE_H,x2=b.x+NODE_W/2,y2=b.y;
      const p=document.createElementNS(SVGNS,'path');
      p.setAttribute('d',`M${x1},${y1} C${x1},${(y1+y2)/2} ${x2},${(y1+y2)/2} ${x2},${y2}`);
      p.dataset.a=r;p.dataset.b=d.id;gEdges.appendChild(p);edgeEls.push(p);
    });});
  // nodes
  DATA.forEach(d=>{ if(!pos.has(d.id))return; const c=pos.get(d.id);
    const st=status(d);
    const g=document.createElementNS(SVGNS,'g');g.setAttribute('class','node '+st);g.setAttribute('transform',`translate(${c.x},${c.y})`);g.dataset.id=d.id;
    const rect=document.createElementNS(SVGNS,'rect');rect.setAttribute('class','bg');rect.setAttribute('width',NODE_W);rect.setAttribute('height',NODE_H);rect.setAttribute('rx',5);g.appendChild(rect);
    const bar=document.createElementNS(SVGNS,'rect');bar.setAttribute('class','bar');bar.setAttribute('width',3.5);bar.setAttribute('height',NODE_H);bar.setAttribute('fill',TC[d.trader]||'#888');bar.setAttribute('rx',2);g.appendChild(bar);
    const nm=document.createElementNS(SVGNS,'text');nm.setAttribute('class','nm');nm.setAttribute('x',9);nm.setAttribute('y',11.5);
    const dname=dn(d);nm.textContent=(st==="seed"?"★ ":"")+(dname.length>24?dname.slice(0,23)+'…':dname);g.appendChild(nm);
    const meta=document.createElementNS(SVGNS,'text');meta.setAttribute('class','meta');meta.setAttribute('x',9);meta.setAttribute('y',22.5);
    const uc=descCount.get(d.id);meta.textContent=`${d.exp.toLocaleString('ru-RU')} XP`+(uc?`  ·  ⇧${uc}`:'');g.appendChild(meta);
    gNodes.appendChild(g);nodeEls.set(d.id,g);
  });
  LW=traders.length*(COL_W+COL_GAP); LH=maxColH+40;
  if(pinned&&nodeEls.has(pinned)){nodeEls.get(pinned).classList.add('sel');highlight(pinned);}
  fit();
}

// ---- highlight ----
let pinned=null;
function highlight(id){
  const anc=ancestors(id),desc=descendants(id),keep=new Set([id,...anc,...desc]);
  nodeEls.forEach((g,nid)=>g.classList.toggle('dim',!keep.has(nid)));
  edgeEls.forEach(p=>{const on=keep.has(p.dataset.a)&&keep.has(p.dataset.b);p.classList.toggle('hl',on);});
}
function clearHi(){nodeEls.forEach(g=>g.classList.remove('dim'));edgeEls.forEach(p=>p.classList.remove('hl'));}

function showInfo(id){
  const d=byId.get(id),st=status(d),anc=ancestors(id);
  const chainXP=[...anc].reduce((s,x)=>s+byId.get(x).exp,0)+d.exp;
  const badge={req:`<span class="badge b-req">${t('b_req')}</span>`,seed:`<span class="badge b-seed">${t('b_seed')}</span>`,junk:`<span class="badge b-junk">${t('b_junk')}</span>`,normal:`<span class="badge b-norm">${t('b_norm')}</span>`}[st];
  document.getElementById('infoBody').innerHTML=badge+`<h2>${dn(d)}</h2>`+
    `<div class="row"><span>${t('i_trader')}</span><span style="color:${TC[d.trader]}">${d.trader}</span></div>`+
    `<div class="row"><span>${t('i_xp')}</span><span class="g">${d.exp.toLocaleString('ru-RU')} XP</span></div>`+
    `<div class="row"><span>${t('i_lvl')}</span><span>${d.minLevel||'—'}</span></div>`+
    (d.map?`<div class="row"><span>${t('i_map')}</span><span>${d.map}</span></div>`:'')+
    `<div class="row"><span>${t('i_pre')}</span><span>${d.requires.length}</span></div>`+
    `<div class="row"><span>${t('i_ch')}</span><span>${anc.size}</span></div>`+
    `<div class="row"><span>${t('i_chxp')}</span><span class="g">${chainXP.toLocaleString('ru-RU')} XP</span></div>`+
    `<div class="row"><span>${t('i_unl')}</span><span>${descCount.get(id)}</span></div>`;
  document.getElementById('info').style.display='block';
}

gNodes.addEventListener('mouseover',e=>{const g=e.target.closest('.node');if(g&&!pinned)highlight(g.dataset.id);});
gNodes.addEventListener('mouseout',e=>{if(!pinned&&e.target.closest('.node'))clearHi();});
gNodes.addEventListener('click',e=>{const g=e.target.closest('.node');if(!g)return;const id=g.dataset.id;
  if(pinned===id){pinned=null;g.classList.remove('sel');clearHi();document.getElementById('info').style.display='none';return;}
  nodeEls.forEach(n=>n.classList.remove('sel'));g.classList.add('sel');pinned=id;highlight(id);showInfo(id);});
document.getElementById('infoClose').onclick=()=>{document.getElementById('info').style.display='none';if(pinned){nodeEls.get(pinned)?.classList.remove('sel');pinned=null;clearHi();}};
addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('infoClose').onclick();});

// ---- pan/zoom ----
let tx=0,ty=0,k=1;const stage=document.getElementById('stage'),view=document.getElementById('view');
const apply=()=>view.setAttribute('transform',`translate(${tx},${ty}) scale(${k})`);
function fit(){const r=stage.getBoundingClientRect(),pad=70;k=Math.min((r.width-pad)/LW,(r.height-pad)/LH,1);if(!isFinite(k)||k<=0)k=.5;tx=(r.width-LW*k)/2;ty=(r.height-LH*k)/2;apply();}
const clampK=v=>Math.max(.06,Math.min(4,v));
function zoomAt(mx,my,f){const nk=clampK(k*f);tx=mx-(mx-tx)*(nk/k);ty=my-(my-ty)*(nk/k);k=nk;apply();}
stage.addEventListener('wheel',e=>{e.preventDefault();const r=stage.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.12:1/1.12);},{passive:false});

// unified pointer pan (1 finger / mouse) + pinch-zoom (2 fingers) — touch & desktop
const pts=new Map(); let panP=null, pinch=null;
stage.addEventListener('pointerdown',e=>{
  if(e.target.closest('.node')||e.target.closest('button'))return;   // let quest taps & UI buttons through
  stage.setPointerCapture(e.pointerId);
  pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pts.size===1){panP={x:e.clientX,y:e.clientY,tx,ty};pinch=null;stage.classList.add('drag');}
  else if(pts.size===2){panP=null;startPinch();}
});
stage.addEventListener('pointermove',e=>{
  if(!pts.has(e.pointerId))return;
  pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pts.size>=2&&pinch){
    const[a,b]=[...pts.values()],r=stage.getBoundingClientRect();
    const dist=Math.hypot(a.x-b.x,a.y-b.y),mx=(a.x+b.x)/2-r.left,my=(a.y+b.y)/2-r.top;
    k=clampK(pinch.k*dist/pinch.dist); tx=mx-pinch.gx*k; ty=my-pinch.gy*k; apply();
  } else if(panP){tx=panP.tx+(e.clientX-panP.x);ty=panP.ty+(e.clientY-panP.y);apply();}
});
function startPinch(){const[a,b]=[...pts.values()],r=stage.getBoundingClientRect();
  const mx=(a.x+b.x)/2-r.left,my=(a.y+b.y)/2-r.top;
  pinch={dist:Math.hypot(a.x-b.x,a.y-b.y),k,gx:(mx-tx)/k,gy:(my-ty)/k};}
function endPtr(e){pts.delete(e.pointerId);if(pts.size<2)pinch=null;
  if(pts.size===1){const[p]=[...pts.values()];panP={x:p.x,y:p.y,tx,ty};}
  else if(pts.size===0){panP=null;stage.classList.remove('drag');}}
stage.addEventListener('pointerup',endPtr);
stage.addEventListener('pointercancel',endPtr);
document.getElementById('fit').onclick=fit;
const zoomCenter=f=>{const r=stage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,f);};
document.getElementById('zin').onclick=()=>zoomCenter(1.25);
document.getElementById('zout').onclick=()=>zoomCenter(1/1.25);

// ---- controls ----
document.getElementById('switch').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  MODE=b.dataset.mode;document.querySelectorAll('#switch button').forEach(x=>x.classList.toggle('on',x===b));
  pinned=null;document.getElementById('info').style.display='none';updateStats();render();});
const bind=(id,ev,fn)=>document.getElementById(id).addEventListener(ev,fn);
bind('f-req','change',e=>{F.req=e.target.checked;render();});
bind('f-normal','change',e=>{F.normal=e.target.checked;render();});
bind('f-junk','change',e=>{F.junk=e.target.checked;render();});
bind('minxp','input',e=>{F.minxp=+e.target.value;document.getElementById('minxpv').textContent=F.minxp.toLocaleString('ru-RU');render();});
bind('minunlock','input',e=>{F.minunlock=+e.target.value;document.getElementById('minunlockv').textContent=F.minunlock;render();});
bind('links','change',e=>document.body.classList.toggle('links',e.target.checked));

const matchName=(d,q)=>d.name.toLowerCase().includes(q)||(d.nameRu||"").toLowerCase().includes(q);
const search=document.getElementById('search');
search.addEventListener('input',()=>{const q=search.value.trim().toLowerCase();if(!q){if(!pinned)clearHi();return;}
  nodeEls.forEach((g,id)=>g.classList.toggle('dim',!matchName(byId.get(id),q)));edgeEls.forEach(p=>p.classList.remove('hl'));});
search.addEventListener('keydown',e=>{if(e.key!=='Enter')return;const q=search.value.trim().toLowerCase();const hit=DATA.find(d=>matchName(d,q)&&nodeEls.has(d.id));
  if(hit){nodeEls.get(hit.id).dispatchEvent(new MouseEvent('click',{bubbles:true}));const c=nodeEls.get(hit.id).getAttribute('transform').match(/translate\(([-\d.]+),([-\d.]+)\)/);const r=stage.getBoundingClientRect();tx=r.width/2-(+c[1]+NODE_W/2)*k;ty=r.height/2-(+c[2]+NODE_H/2)*k;apply();}});

// ---- language ----
function applyLang(){
  document.querySelectorAll('[data-t]').forEach(el=>el.textContent=t(el.dataset.t));
  document.querySelectorAll('[data-tph]').forEach(el=>el.placeholder=t(el.dataset.tph));
  document.documentElement.lang=LANG;
  updateStats();render();
}
document.getElementById('langsw').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  LANG=b.dataset.lang;document.querySelectorAll('#langsw button').forEach(x=>x.classList.toggle('on',x===b));
  if(pinned)showInfo(pinned);applyLang();});

applyLang();
</script>
