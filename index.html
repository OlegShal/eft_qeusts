<!DOCTYPE html>

<html lang="ru">
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>EFT · Kappa Quest Planner</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      :root {
        --bg0: #0a0b06;
        --bg: #0f0f09;
        --bg2: #17170f;
        --panel: #1c1c13;
        --panel2: #26261a;
        --line: #33322a;
        --line2: #43423a;
        --text: #e9e7da;
        --muted: #9a9c85;
        --dim: #6f7160;
        --gold: #e8c15a;
        --gold2: #ffe08a;
        --gold-dark: #caa63f;
        --goldsoft: #6d5f2a;
        --good: #63c088;
        --bad: #e5484d;
        --junk: #5b5d50;
        --event: #a066ff;
      }

      :root[data-theme="emerald"] {
        --bg0: #070d09;
        --bg: #0b100c;
        --bg2: #121a14;
        --panel: #172018;
        --panel2: #202a22;
        --line: #293529;
        --line2: #384738;
        --text: #dfeae2;
        --muted: #8ba493;
        --dim: #5f7266;
        --gold: #46c98a;
        --gold2: #7fe6b0;
        --gold-dark: #2f9b68;
        --goldsoft: #274c3a;
      }

      :root[data-theme="azure"] {
        --bg0: #080a0e;
        --bg: #0d0e12;
        --bg2: #15161b;
        --panel: #191b21;
        --panel2: #22252c;
        --line: #2c3039;
        --line2: #3b4048;
        --text: #e2e6ee;
        --muted: #8f95a3;
        --dim: #666d7a;
        --gold: #56a8ea;
        --gold2: #8fccff;
        --gold-dark: #3f86c9;
        --goldsoft: #274763;
      }

      :root[data-theme="amethyst"] {
        --bg0: #0b080d;
        --bg: #100d12;
        --bg2: #18141a;
        --panel: #1d1820;
        --panel2: #28222f;
        --line: #322c38;
        --line2: #423b47;
        --text: #e8e2ee;
        --muted: #9a8fa6;
        --dim: #6f6579;
        --gold: #b483f0;
        --gold2: #d3b3ff;
        --gold-dark: #9560d8;
        --goldsoft: #43356b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: "Segoe UI", Roboto, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 14px;
        background: linear-gradient(var(--panel2), var(--bg2));
        border-bottom: 1px solid var(--line);
        flex-wrap: wrap;
      }

      .brand {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.5px;
        white-space: nowrap;
      }

      .brand b {
        color: var(--gold);
      }

      .switch {
        display: flex;
        border: 1px solid var(--goldsoft);
        border-radius: 9px;
        overflow: hidden;
        background: var(--bg0);
      }

      .switch button {
        padding: 6px 12px;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        line-height: 1.1;
        text-align: center;
      }

      .switch button small {
        display: block;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.5px;
        opacity: 0.7;
      }

      .switch button.on {
        background: linear-gradient(var(--gold), var(--gold-dark));
        color: var(--bg);
        text-shadow: none;
      }

      .switch button:not(.on):hover {
        color: var(--gold);
      }

      .vsw button {
        padding: 8px 12px;
      }

      .vsw button.on {
        background: var(--line);
        color: var(--text);
      }

      .btn {
        background: var(--bg2);
        border: 1px solid var(--line);
        color: var(--text);
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
      }

      .btn:hover {
        border-color: var(--gold);
        color: var(--gold);
      }

      .kbtn.on {
        background: var(--goldsoft);
        color: #fff;
        border-color: var(--gold);
      }

      #btnLogin {
        background: linear-gradient(var(--gold), var(--gold-dark));
        color: var(--bg);
        border-color: var(--gold);
        font-weight: 700;
      }

      #btnLogin:hover {
        filter: brightness(1.08);
        color: var(--bg);
      }

      .lg-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(0, 0, 0, 0.62);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .lg-card {
        position: relative;
        width: 100%;
        max-width: 340px;
        background: var(--bg2);
        border: 1px solid var(--line2);
        border-radius: 14px;
        padding: 24px 20px 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .lg-card h3 {
        margin: 0;
        font-size: 18px;
        color: var(--gold);
      }

      .lg-sub {
        margin: 0 0 6px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.4;
      }

      .lg-x {
        position: absolute;
        top: 12px;
        right: 14px;
        background: none;
        border: 0;
        color: var(--muted);
        font-size: 18px;
        cursor: pointer;
      }

      .lg-card input {
        width: 100%;
        background: var(--bg2);
        border: 1px solid var(--line2);
        border-radius: 8px;
        padding: 12px;
        color: var(--text);
        font-size: 15px;
      }

      .lg-card input:focus {
        outline: none;
        border-color: var(--gold);
      }

      .lg-primary {
        background: linear-gradient(var(--gold), var(--gold-dark));
        color: var(--bg);
        border: 0;
        border-radius: 8px;
        padding: 12px;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        margin-top: 2px;
      }

      .lg-secondary {
        background: transparent;
        border: 1px solid var(--line2);
        color: var(--text);
        border-radius: 8px;
        padding: 11px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
      }

      .lg-secondary:hover {
        border-color: var(--gold);
        color: var(--gold);
      }

      .lg-or {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 11px;
        margin: 4px 0;
      }

      .lg-or::before,
      .lg-or::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--line2);
      }

      .lg-google {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        background: #fff;
        color: var(--panel2);
        border: 0;
        border-radius: 8px;
        padding: 13px;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
      }

      .lg-google:hover {
        filter: brightness(0.96);
      }

      .lg-g-icon {
        width: 18px;
        height: 18px;
        flex: none;
      }

      .lg-err {
        color: var(--bad);
        font-size: 12.5px;
        line-height: 1.35;
      }

      .lg-err:empty {
        display: none;
      }

      .stats {
        display: flex;
        gap: 14px;
        font-size: 12px;
        color: var(--muted);
        flex-wrap: wrap;
      }

      .stats b {
        color: var(--text);
      }

      .stats .g {
        color: var(--gold);
      }

      .spacer {
        flex: 1;
      }

      .auth-ui {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }

      #userProfile {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #userName {
        font-weight: 700;
        color: var(--gold);
      }

      .langsw {
        display: flex;
        border: 1px solid var(--line);
        border-radius: 6px;
        overflow: hidden;
      }

      .langsw button {
        padding: 7px 10px;
        background: var(--bg2);
        border: 0;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
      }

      .langsw button.on {
        background: var(--line);
        color: var(--text);
      }

      .ctrl {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
      }

      input[type="search"] {
        background: var(--bg2);
        border: 1px solid var(--line);
        color: var(--text);
        padding: 8px 10px;
        border-radius: 6px;
        width: 170px;
        font-size: 12px;
      }

      /* bar */

      #bar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        background: var(--bg);
        border-bottom: 1px solid var(--line);
        flex-wrap: wrap;
        font-size: 12px;
      }

      .f-group {
        background: var(--bg2);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .f-title {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
        font-weight: 700;
      }

      .f-toggles {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .f-btn {
        background: var(--bg0);
        border: 1px solid var(--line);
        color: var(--muted);
        padding: 5px 12px;
        border-radius: 14px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .f-btn::before {
        content: "";
        display: block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--c, #555);
      }

      .f-btn.on {
        border-color: var(--c, var(--gold));
        color: var(--text);
        background: rgba(255, 255, 255, 0.05);
      }

      .f-btn.on::before {
        box-shadow: 0 0 6px var(--c, var(--gold));
      }

      .f-group input[type="range"] {
        width: 120px;
        accent-color: var(--gold);
        margin: 4px 0;
      }

      .lvl-step {
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 4px 0;
      }

      .lvl-step input[type="number"] {
        width: 44px;
        text-align: center;
        background: var(--bg2);
        color: var(--text);
        border: 1px solid var(--line2);
        border-radius: 6px;
        padding: 5px 4px;
        font-size: 14px;
        font-weight: 700;
        -moz-appearance: textfield;
        appearance: textfield;
      }

      .lvl-step input[type="number"]::-webkit-inner-spin-button,
      .lvl-step input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .lvl-btn {
        width: 28px;
        height: 28px;
        flex: none;
        padding: 0;
        border: 1px solid var(--line2);
        background: var(--panel);
        color: var(--gold);
        border-radius: 6px;
        font-size: 17px;
        line-height: 1;
        cursor: pointer;
        font-weight: 700;
      }

      .lvl-btn:hover {
        background: var(--gold);
        color: #000;
      }

      .theme-sw {
        display: flex;
        gap: 8px;
        margin: 4px 0;
      }

      .theme-dot {
        width: 26px;
        height: 26px;
        flex: none;
        border-radius: 50%;
        border: 2px solid transparent;
        background: var(--d);
        cursor: pointer;
        padding: 0;
      }

      .theme-dot.on {
        border-color: var(--text);
      }

      .hdr-tools {
        display: flex;
        align-items: center;
        gap: 14px;
        flex: none;
        white-space: nowrap;
      }

      .hdr-level {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: none;
      }

      .hdr-lbl {
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
        white-space: nowrap;
      }

      .hdr-tools .lvl-step,
      .hdr-tools .theme-sw {
        margin: 0;
      }

      .hdr-tools .theme-dot {
        width: 20px;
        height: 20px;
      }

      .season-btn {
        flex: none;
        white-space: nowrap;
        background: var(--panel);
        border: 1px solid var(--line2);
        color: var(--muted);
        padding: 6px 10px;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
      }

      .season-btn:hover {
        border-color: var(--gold);
        color: var(--text);
      }

      .season-btn.on {
        background: linear-gradient(var(--gold2), var(--gold));
        border-color: var(--gold2);
        color: #161206;
        box-shadow:
          0 0 10px var(--gold),
          0 0 20px color-mix(in srgb, var(--gold) 50%, transparent);
        animation: seasonPulse 0.55s ease-out 1;
      }

      @keyframes seasonPulse {
        0% {
          box-shadow: 0 0 3px var(--gold);
        }
        55% {
          box-shadow:
            0 0 18px var(--gold),
            0 0 34px color-mix(in srgb, var(--gold) 80%, transparent);
        }
        100% {
          box-shadow:
            0 0 10px var(--gold),
            0 0 20px color-mix(in srgb, var(--gold) 50%, transparent);
        }
      }

      #legend {
        flex-direction: row;
        align-items: center;
        padding: 8px 12px;
        flex-wrap: wrap;
      }

      .legend-item {
        padding: 4px 10px;
        border-radius: 12px;
        background: var(--bg0);
        border: 1px solid var(--line);
        font-size: 11px;
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        user-select: none;
        transition: 0.2s;
      }

      .legend-item .sw {
        width: 10px;
        height: 10px;
        border-radius: 3px;
      }

      #reqstrip {
        display: none;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        background: linear-gradient(90deg, color-mix(in srgb, var(--gold) 12%, transparent), color-mix(in srgb, var(--gold) 2%, transparent));
        border-bottom: 1px solid var(--goldsoft);
        font-size: 11.5px;
        color: var(--gold2);
        flex-wrap: wrap;
      }

      #reqstrip b {
        color: var(--gold2);
      }

      #reqstrip .pill {
        border: 1px solid var(--goldsoft);
        border-radius: 20px;
        padding: 2px 9px;
        background: rgba(0, 0, 0, 0.2);
      }

      /* views */

      #stage {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: radial-gradient(circle at 50% 35%, var(--bg2), var(--bg0) 92%);
        cursor: grab;
      }

      #stage.drag {
        cursor: grabbing;
      }

      body.listview #stage,
      body.plannerview #stage {
        touch-action: auto;
        overflow: auto;
        cursor: auto;
        background: var(--bg);
      }

      #svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      body.listview #svg,
      body.listview #zoombox,
      body.listview #hint {
        display: none;
      }

      body.plannerview #svg,
      body.plannerview #zoombox,
      body.plannerview #hint {
        display: none;
      }

      /* GRAPH */

      .colhead text {
        font-weight: 700;
        font-size: 13px;
        fill: var(--text);
      }

      .colhead .cnt {
        font-size: 10px;
        fill: var(--muted);
        font-weight: 600;
      }

      .collane {
        fill: rgba(255, 255, 255, 0.015);
        stroke: var(--line);
        stroke-width: 1;
      }

      #edges path {
        fill: none;
        stroke: rgba(255, 255, 255, 0.15);
        stroke-width: 1.2;
        opacity: 0;
        pointer-events: none;
      }

      body.links #edges path {
        opacity: 0.05;
      }

      #edges path.hl {
        opacity: 0.9;
        stroke: var(--gold);
        stroke-width: 1.5;
      }

      .node {
        cursor: pointer;
        pointer-events: all;
      }

      .node rect.bg {
        stroke-width: 1.4;
        pointer-events: all;
      }

      .node text {
        pointer-events: none;
        dominant-baseline: middle;
      }

      .node .nm {
        font-size: 11px;
        fill: var(--text);
      }

      .node .meta {
        font-size: 9px;
        fill: var(--muted);
      }

      .node.normal rect.bg {
        fill: var(--panel2);
        stroke: var(--line);
      }

      .node.req rect.bg {
        fill: color-mix(in srgb, var(--gold) 16%, transparent);
        stroke: var(--gold);
      }

      .node.req .nm {
        fill: var(--gold2);
      }

      .node.seed rect.bg {
        fill: color-mix(in srgb, var(--gold) 30%, transparent);
        stroke: var(--gold2);
        stroke-width: 2;
      }

      .node.junk {
        opacity: 0.5;
      }

      .node.junk rect.bg {
        fill: var(--bg2);
        stroke: var(--line);
        stroke-dasharray: 3 3;
      }

      .node.junk .nm {
        fill: var(--dim);
      }

      .node.event rect.bg {
        fill: rgba(160, 102, 255, 0.1);
        stroke: var(--event);
      }

      .node.dim {
        opacity: 0.15;
        pointer-events: all;
      }

      .node.sel rect.bg {
        stroke: #fff;
        stroke-width: 2.5;
      }

      .node.ndone rect.bg {
        fill: rgba(99, 192, 136, 0.1);
        stroke: var(--good);
        stroke-dasharray: none;
      }

      .node.ndone text {
        fill: var(--good);
        opacity: 0.7;
      }

      .node.navail rect.bg {
        stroke: #fff;
        stroke-dasharray: 3 3;
        stroke-width: 1.5;
      }

      .node.navail .nm {
        fill: #fff;
      }

      .node.nhigher {
        opacity: 0.2;
      }

      .hidden {
        display: none;
      }

      /* LIST */

      #list {
        position: absolute;
        inset: 0;
        overflow: auto;
        display: none;
        padding: 4px 10px 40px;
      }

      body.listview #list {
        display: block;
      }

      .qt {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      .qt th {
        position: sticky;
        top: 0;
        background: var(--panel);
        color: var(--muted);
        text-align: left;
        padding: 12px 8px;
        border-bottom: 1px solid var(--line2);
        cursor: pointer;
        white-space: nowrap;
        font-weight: 600;
        z-index: 1;
      }

      .qt th.num {
        text-align: right;
      }

      .qt th.s {
        color: var(--gold);
      }

      .qt th[data-sort]:hover {
        color: var(--text);
      }

      .qt td {
        padding: 10px 8px;
        border-bottom: 1px solid var(--panel2);
      }

      .qt tr:hover td {
        background: var(--panel);
      }

      .qt .qr {
        cursor: pointer;
      }

      .qt .dim {
        opacity: 0.4;
      }

      .cdone {
        width: 36px;
        text-align: center;
      }

      .cdone input {
        width: 20px;
        height: 20px;
        accent-color: var(--good);
        cursor: pointer;
      }

      .qt .empty {
        text-align: center;
        color: var(--muted);
        padding: 30px;
      }

      .badge {
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 20px;
        font-weight: 700;
        white-space: nowrap;
      }

      .b-req {
        background: var(--gold);
        color: var(--bg);
      }

      .b-seed {
        background: var(--gold2);
        color: var(--bg);
      }

      .b-junk {
        background: var(--junk);
        color: #111;
      }

      .b-norm {
        background: var(--panel2);
        color: var(--muted);
      }

      .b-event {
        background: var(--event);
        color: #08222a;
      }

      /* PLANNER */

      #planner {
        position: absolute;
        inset: 0;
        overflow: auto;
        display: none;
        background: var(--bg);
      }

      body.plannerview #planner {
        display: block;
      }

      .planner-layout {
        display: flex;
        height: 100%;
        max-width: 1600px;
        margin: 0 auto;
      }

      .planner-sidebar {
        width: 320px;
        background: var(--bg2);
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding: 20px 16px;
      }

      .side-title {
        font-size: 12px;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 700;
        margin-bottom: 16px;
        letter-spacing: 1px;
      }

      .map-btn {
        padding: 14px 16px;
        border-radius: 12px;
        background: var(--bg2);
        border: 1px solid var(--line);
        margin-bottom: 10px;
        cursor: pointer;
        transition: 0.2s;
      }

      .map-btn:hover {
        border-color: var(--line);
        background: var(--panel);
      }

      .map-btn.active {
        border-color: var(--gold);
        background: color-mix(in srgb, var(--gold) 8%, transparent);
      }

      .m-nm {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 4px;
      }

      .m-st {
        font-size: 12px;
        color: var(--muted);
      }

      .m-st b {
        color: var(--gold);
      }

      .planner-content {
        flex: 1;
        overflow-y: auto;
        padding: 24px 32px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .global-panel {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px;
      }

      .g-title {
        font-weight: 700;
        color: var(--gold);
        margin-bottom: 16px;
        font-size: 14px;
      }

      .g-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 12px;
      }

      .g-quest {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--bg2);
        padding: 12px 14px;
        border-radius: 8px;
        border: 1px solid var(--line);
        cursor: pointer;
        transition: 0.2s;
      }

      .g-quest:hover {
        border-color: var(--goldsoft);
      }

      .gq-nm {
        font-size: 13px;
        font-weight: 600;
      }

      .g-quest input {
        width: 18px;
        height: 18px;
        accent-color: var(--good);
        cursor: pointer;
      }

      .active-map-panel {
        flex: 1;
        background: var(--bg2);
        border-radius: 16px;
        border: 1px solid var(--line);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .am-header {
        padding: 30px;
        background: linear-gradient(to bottom, color-mix(in srgb, var(--gold) 5%, transparent), transparent);
        border-bottom: 1px solid var(--line);
      }

      .am-header h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .am-sub {
        font-size: 14px;
        color: var(--muted);
      }

      .am-list {
        padding: 20px 30px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }

      .am-quest {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 20px;
        background: var(--bg2);
        border: 1px solid var(--line);
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
      }

      .am-quest:hover {
        border-color: var(--goldsoft);
        background: var(--panel);
      }

      .am-quest input {
        width: 24px;
        height: 24px;
        accent-color: var(--good);
        cursor: pointer;
      }

      .amq-name {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .amq-meta {
        font-size: 13px;
        color: var(--muted);
      }

      .am-quest.dim {
        opacity: 0.35;
        pointer-events: none;
      }

      @media (max-width: 820px) {
        .planner-layout {
          flex-direction: column;
        }

        .planner-sidebar {
          width: 100%;
          border-right: 0;
          border-bottom: 1px solid var(--line);
          max-height: 300px;
        }

        .planner-content {
          padding: 16px;
        }

        .am-header {
          padding: 20px;
        }

        .am-list {
          padding: 16px;
        }
      }

      /* INFO PANEL */

      #info {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 360px;
        min-height: min(520px, calc(100% - 24px));
        background: rgba(24, 26, 19, 0.98);
        border: 1px solid var(--line2);
        border-radius: 11px;
        padding: 40px 16px 16px;
        font-size: 13px;
        box-shadow: 0 10px 34px rgba(0, 0, 0, 0.55);
        display: none;
        max-height: calc(100% - 24px);
        overflow-y: auto;
        overscroll-behavior: contain;
        z-index: 50;
      }

      #info h2 {
        margin: 0 0 8px;
        font-size: 16px;
        line-height: 1.25;
        padding-right: 16px;
      }

      #info .row {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        border-bottom: 1px dashed var(--panel2);
      }

      #info .g {
        color: var(--gold);
        font-weight: 600;
      }

      #info .row span:first-child {
        color: var(--muted);
      }

      #info .close {
        position: absolute;
        top: 10px;
        right: 12px;
        cursor: pointer;
        color: var(--muted);
        font-size: 18px;
      }

      #info .close:hover {
        color: var(--text);
      }

      .todo {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg2);
      }

      .t-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-bottom: 1px solid var(--panel);
      }

      .t-row:last-child {
        border: 0;
      }

      .t-row.tdone {
        opacity: 0.4;
        text-decoration: line-through;
      }

      .btn-done {
        width: 100%;
        background: var(--good);
        color: #000;
        border: 0;
        padding: 8px;
        border-radius: 6px;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 12px;
        font-size: 14px;
      }

      .btn-done.is-done {
        background: transparent;
        border: 1px solid var(--bad, #e5484d);
        color: var(--bad, #e5484d);
      }

      .btn-done.is-done:hover {
        background: var(--bad, #e5484d);
        color: #fff;
      }

      #hint {
        position: absolute;
        bottom: 10px;
        left: 14px;
        font-size: 11px;
        color: var(--dim);
        pointer-events: none;
      }

      #zoombox {
        position: absolute;
        bottom: 10px;
        right: 14px;
        display: flex;
        gap: 6px;
      }

      #zoombox button {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }

      .only-mobile {
        display: none;
      }

      /* MOBILE RESPONSIVE */

      @media (max-width: 820px) {
        html,
        body {
          -webkit-tap-highlight-color: transparent;
        }

        .only-mobile {
          display: inline-flex;
          align-items: center;

        header {
          gap: 8px;
          padding: 8px 10px;
        }

        .brand,

        .switch button {

        .langsw {

        .langsw button {

        .ctrl {

        NODE_H = 44,
        ROW_H = 50,
        TOP = 80,
        HEAD = 40;

      const JUNK_XP = 12000;

      // ---- graph relations ----

      const childMap = new Map(DATA.map((d) => [d.id, []]));

      DATA.forEach((d) => d.requires.forEach((r) => childMap.get(r) && childMap.get(r).push(d.id)));

      function ancestors(id) {
        const s = new Set(),
          st = [id];
        while (st.length) {
          const c = st.pop();
          byId.get(c).requires.forEach((r) => {
            if (byId.has(r) && !s.has(r)) {
              s.add(r);
              st.push(r);
            }
          });
        }
        return s;
      }

      function descendants(id) {
        const s = new Set(),
          st = [id];
        while (st.length) {
          const c = st.pop();
          childMap.get(c).forEach((k) => {
            if (!s.has(k)) {
              s.add(k);
              st.push(k);
            }
          });
        }
        return s;
      }

      const depth = new Map();

      (function () {
        function dep(id) {
          if (depth.has(id)) return depth.get(id);
          depth.set(id, 0);
          let m = 0;
          byId.get(id).requires.forEach((r) => byId.has(r) && (m = Math.max(m, dep(r) + 1)));
          depth.set(id, m);
          return m;
        }
        DATA.forEach((d) => dep(d.id));
      })();

      const descCount = new Map(DATA.map((d) => [d.id, descendants(d.id).size]));

      function orderTraderList(list) {
        const base = (d) => d.name.split(/\s[-–—]\s/)[0].trim();

        const partNum = (d) => {
          const m = d.name.match(/part\s+(\d+)/i);
          return m ? +m[1] : 0;
        };

        const set = new Set(list.map((d) => d.id));

        const dC = new Map();

        function td(id) {
          if (dC.has(id)) return dC.get(id);
          dC.set(id, 0);
          let m = 0;
          byId.get(id).requires.forEach((r) => {
            if (set.has(r)) m = Math.max(m, td(r) + 1);
          });
          dC.set(id, m);
          return m;
        }

        const groups = new Map();

        list.forEach((d) => {
          const b = base(d);
          if (!groups.has(b)) groups.set(b, []);
          groups.get(b).push(d);
        });

        const blockLevel = new Map(),
          groupOf = new Map(),
          isSeries = new Set();

        groups.forEach((arr, b) => {
          blockLevel.set(b, Math.min(...arr.map((d) => d.minLevel)));
          if (arr.length > 1) isSeries.add(b);
          arr.forEach((d) => groupOf.set(d.id, b));
        });

        const sorted = list.slice().sort((a, b) => {
          const ba = base(a),
            bb = base(b);

          if (ba !== bb) {
            const dl = blockLevel.get(ba) - blockLevel.get(bb);
            if (dl) return dl;
            return ba.localeCompare(bb);
          }

          return (
            a.minLevel - b.minLevel || partNum(a) - partNum(b) || td(a.id) - td(b.id) || dn(a).localeCompare(dn(b))
          );
        });

        return { list: sorted, groupOf, isSeries };
      }

      const SEED_NAMES = [
        "chemical - part 4",
        "a shooter born in heaven",
        "the tarkov shooter - part 4",
        "sew it good - part 4",
      ];

      const norm = (s) => s.toLowerCase().replace(/[–—-]/g, "-");

      const seedIds = new Set(DATA.filter((d) => SEED_NAMES.includes(norm(d.name))).map((d) => d.id));

      const newReq = new Set();

      seedIds.forEach((id) => {
        newReq.add(id);
        ancestors(id).forEach((a) => newReq.add(a));
      });

      // ---- mode / status ----

      let MODE = "new";

      const EVENT_MAPS = new Set(["The Labyrinth", "Icebreaker"]);

      const EVENT_IDS = new Set(DATA.filter((d) => EVENT_MAPS.has(d.map)).map((d) => d.id));

      function isEvent(d) {
        return EVENT_IDS.has(d.id);
      }

      function isReq(d) {
        return MODE === "old" ? !!d.kappa : newReq.has(d.id);
      }

      function isJunk(d) {
        return !isReq(d) && !isEvent(d) && descCount.get(d.id) === 0 && d.exp < JUNK_XP;
      }

      function status(d) {
        if (isEvent(d)) return "event";
        if (isReq(d)) return seedIds.has(d.id) && MODE === "new" ? "seed" : "req";
        if (isJunk(d)) return "junk";
        return "normal";
      }

      // ---- STATE ----

      const traderOn = new Set(traders);

      const F = {
        req: true,
        normal: true,
        junk: false,
        event: false,
        minxp: 0,
        minunlock: 0,
        hidedone: false,
        onlyavail: false,
      };

      let myLevel = 0;

      let scopeKappa = false;

      let viewMode = "graph";

      let searchQ = "";

      let seasonal = false;
      try {
        seasonal = localStorage.getItem("eft_kappa_seasonal") === "1";
      } catch (e) {}
      const sx = (v) => Math.round(v * (seasonal ? 1.25 : 1));

      let done = new Set();

      try {
        const v = localStorage.getItem("eft_kappa_done");
        if (v) JSON.parse(v).forEach((id) => done.add(id));
      } catch (e) {}

      const saveLocal = () => {
        localStorage.setItem("eft_kappa_done", JSON.stringify([...done]));
      };

      let persist = saveLocal;

      try {
        const ml = localStorage.getItem("eft_kappa_level");
        if (ml) myLevel = +ml;
      } catch (e) {}

      function toggleDone(id) {
        if (done.has(id)) {
          done.delete(id);
          descendants(id).forEach((x) => done.delete(x));
        } else {
          done.add(id);
          ancestors(id).forEach((x) => done.add(x));
        }

        persist();
      }

      function available(d) {
        return d.requires.every((r) => done.has(r));
      }

      function aboveLevel(d) {
        return myLevel > 0 && d.minLevel > myLevel;
      }

      // ---- legend ----

      const legend = document.getElementById("legend");

      traders.forEach((tr) => {
        const el = document.createElement("div");
        el.className = "legend-item";

        el.innerHTML = `<span class="sw" style="background:${TC[tr] || "#888"}"></span><span data-t="${tr}">${t(tr)}</span>`;

        el.onclick = () => {
          if (traderOn.has(tr)) {
            traderOn.delete(tr);
            el.style.opacity = 0.4;
          } else {
            traderOn.add(tr);
            el.style.opacity = 1;
          }
          draw();
        };

        legend.appendChild(el);
      });

      function updateStats() {
        const req = DATA.filter(isReq);

        const doneReq = req.reduce((n, d) => n + (done.has(d.id) ? 1 : 0), 0);

        const pct = req.length > 0 ? Math.round((doneReq / req.length) * 100) : 0;

        document.getElementById("stats").innerHTML =
          `${t("s_prog")}: <b class="g">${pct}%</b> (${doneReq} / ${req.length} ${t("q")})`;

        const strip = document.getElementById("reqstrip");

        if (MODE === "new") {
          strip.style.display = "flex";

          strip.innerHTML =
            `<b>${t("collector")}</b>` +
            `<span class="pill">LL4: ${["Therapist", "Prapor", "Peacekeeper", "Mechanic", "Jaeger", "Skier", "Ragman"].map((x) => t(x)).join(" · ")}</span>` +
            `<span class="pill">${t("fencerep")}</span><span class="pill">${t("level")}</span>` +
            `<span class="pill">${t("keys")} ${newReq.size} ${t("chain")}</span>`;
        } else strip.style.display = "none";
      }

      function visible(d) {
        if (!traderOn.has(d.trader)) return false;

        if (scopeKappa && !isReq(d)) return false;

        if (F.hidedone && done.has(d.id)) return false;

        if (F.onlyavail && !available(d)) return false;

        const st = status(d);

        if (st === "event" && !F.event) return false;

        if ((st === "req" || st === "seed") && !F.req) return false;

        if (st === "junk" && !F.junk) return false;

        if (st === "normal" && !F.normal) return false;

        if (d.exp < F.minxp) return false;

        return true;
      }

      const gLanes = document.getElementById("lanes"),
        gEdges = document.getElementById("edges"),
        gNodes = document.getElementById("nodes");

      const nodeEls = new Map();
      let edgeEls = [];
      let LW = 0,
        LH = 0;

      let _firstRender = true;

      function orthPath(sx, sy, ex, ey, cx) {
        if (Math.abs(sy - ey) < 0.5) return `M${sx},${sy} L${ex},${ey}`;

        const r = Math.max(0, Math.min(8, Math.abs(ey - sy) / 2, Math.abs(cx - sx), Math.abs(ex - cx)));

        const d1 = cx >= sx ? 1 : -1,
          d2 = ex >= cx ? 1 : -1,
          vy = ey > sy ? 1 : -1;

        return `M${sx},${sy} L${cx - d1 * r},${sy} Q${cx},${sy} ${cx},${sy + vy * r} L${cx},${ey - vy * r} Q${cx},${ey} ${cx + d2 * r},${ey} L${ex},${ey}`;
      }

      function render() {
        const savedTx = tx,
          savedTy = ty,
          savedK = k;

        gLanes.innerHTML = "";
        gEdges.innerHTML = "";
        gNodes.innerHTML = "";
        nodeEls.clear();
        edgeEls = [];

        const pos = new Map();
        let maxColH = 0;

        let currentX = 20; // some left padding

        traders.forEach((tr) => {
          const { list, groupOf, isSeries } = orderTraderList(DATA.filter((d) => d.trader === tr && visible(d)));

          if (!list.length) return;

          // Determine if we need 2 columns (e.g. if list length > 12)

          const use2Cols = list.length > 12;

          let y1 = TOP,
            y2 = TOP;

          let prev1 = null,
            prev2 = null;

          let lastCol = 1;

          const x1 = currentX;

          const x2 = currentX + COL_W + COL_GAP;

          list.forEach((d) => {
            const g = groupOf.get(d.id);

            let col = 1;

            if (use2Cols) {
              if (lastCol === 1 && prev1 !== g && y1 > TOP) col = 2;
              else if (lastCol === 2 && prev2 !== g) col = 1;
              else col = lastCol;
            }

            if (col === 1) {
              if (prev1 !== null && g !== prev1 && (isSeries.has(g) || isSeries.has(prev1))) y1 += 16;

              pos.set(d.id, { x: x1, y: y1, col: 1 });

              y1 += ROW_H;

              prev1 = g;

              lastCol = 1;
            } else {
              if (prev2 !== null && g !== prev2 && (isSeries.has(g) || isSeries.has(prev2))) y2 += 16;

              pos.set(d.id, { x: x2, y: y2, col: 2 });

              y2 += ROW_H;

              prev2 = g;

              lastCol = 2;
            }
          });

          const colBottom = Math.max(y1, y2);

          maxColH = Math.max(maxColH, colBottom);

          const laneWidth = use2Cols ? COL_W * 2 + COL_GAP : COL_W;

          const lane = document.createElementNS(SVGNS, "rect");
          lane.setAttribute("class", "collane");

          lane.setAttribute("x", currentX - 10);
          lane.setAttribute("y", TOP - 50);
          lane.setAttribute("width", laneWidth + 20);
          lane.setAttribute("height", colBottom - TOP + 60);
          lane.setAttribute("rx", 12);

          gLanes.appendChild(lane);

          const hg = document.createElementNS(SVGNS, "g");
          hg.setAttribute("class", "colhead");

          const ht = document.createElementNS(SVGNS, "text");
          ht.setAttribute("x", currentX + laneWidth / 2);
          ht.setAttribute("y", TOP - 30);
          ht.setAttribute("text-anchor", "middle");
          ht.setAttribute("fill", TC[tr] || "#888");
          ht.textContent = t(tr);
          hg.appendChild(ht);

          const hc = document.createElementNS(SVGNS, "text");
          hc.setAttribute("class", "cnt");
          hc.setAttribute("x", currentX + laneWidth / 2);
          hc.setAttribute("y", TOP - 14);
          hc.setAttribute("text-anchor", "middle");
          hc.textContent = `${list.length} ${t("q")}`;
          hg.appendChild(hc);

          gLanes.appendChild(hg);

          currentX += laneWidth + COL_GAP + 40; // extra padding between traders
        });

        LW = currentX;
        LH = Math.max(400, maxColH + 60);

        DATA.forEach((d) => {
          if (!pos.has(d.id)) return;

          d.requires.forEach((r) => {
            if (!pos.has(r)) return;

            const a = pos.get(r),
              b = pos.get(d.id);

            const ey1 = a.y + NODE_H / 2,
              ey2 = b.y + NODE_H / 2;

            const p = document.createElementNS(SVGNS, "path");

            // Orthogonal (H–V–H) routing with rounded corners; vertical jog in a side channel.

            let sx, ex, cx;

            if (a.x === b.x) {
              sx = a.x;
              ex = a.x;
              cx = a.x - Math.min(34, 14 + Math.abs(ey2 - ey1) * 0.12);
            } else if (a.x < b.x) {
              sx = a.x + NODE_W;
              ex = b.x;
              cx = (sx + ex) / 2;
            } else {
              sx = a.x;
              ex = b.x + NODE_W;
              cx = (sx + ex) / 2;
            }

            p.setAttribute("d", orthPath(sx, ey1, ex, ey2, cx));

            p.dataset.a = r;
            p.dataset.b = d.id;

            gEdges.appendChild(p);
            edgeEls.push(p);
          });
        });

        DATA.forEach((d) => {
          if (!pos.has(d.id)) return;

          const c = pos.get(d.id);

          const g = document.createElementNS(SVGNS, "g");

          let stt = status(d);

          let classes = "node " + stt;

          if (done.has(d.id)) classes += " ndone";
          else if (available(d)) classes += " navail";

          if (aboveLevel(d)) classes += " nhigher";

          g.setAttribute("class", classes);

          g.setAttribute("transform", `translate(${c.x},${c.y})`);

          g.dataset.id = d.id;

          const rect = document.createElementNS(SVGNS, "rect");
          rect.setAttribute("class", "bg");

          rect.setAttribute("width", NODE_W);
          rect.setAttribute("height", NODE_H);
          rect.setAttribute("rx", 8);

          g.appendChild(rect);

          const bar = document.createElementNS(SVGNS, "rect");
          bar.setAttribute("class", "bar");

          bar.setAttribute("x", 6);
          bar.setAttribute("y", 6);
          bar.setAttribute("width", 4);
          bar.setAttribute("height", NODE_H - 12);

          bar.setAttribute("rx", 2);
          bar.setAttribute("fill", TC[d.trader] || "#888");

          g.appendChild(bar);

          const nm = document.createElementNS(SVGNS, "text");
          nm.setAttribute("class", "nm");

          nm.setAttribute("x", 18);
          nm.setAttribute("y", NODE_H / 2 - 4);

          nm.textContent = dn(d).length > 35 ? dn(d).slice(0, 34) + "…" : dn(d);

          g.appendChild(nm);

          const met = document.createElementNS(SVGNS, "text");
          met.setAttribute("class", "meta");

          met.setAttribute("x", 18);
          met.setAttribute("y", NODE_H / 2 + 12);

          let metaTxt = `${sx(d.exp).toLocaleString("ru-RU")} XP`;

          if (d.minLevel > 0) metaTxt += ` · ${t("c_lvl")} ${d.minLevel}`;

          met.textContent = metaTxt;

          g.appendChild(met);

          gNodes.appendChild(g);
          nodeEls.set(d.id, g);
        });

        if (_firstRender) {
          fit();
          _firstRender = false;
        } else {
          tx = savedTx;
          ty = savedTy;
          k = savedK;
          LW = currentX;
          LH = Math.max(400, maxColH + 60);
          apply();
        }
      }

      let pinned = null;

      function highlight(id) {
        const anc = ancestors(id),
          desc = descendants(id),
          keep = new Set([id, ...anc, ...desc]);

        if (pinned && nodeEls.has(pinned)) {
          nodeEls.get(pinned).classList.add("sel");
        }

        nodeEls.forEach((g, nid) => g.classList.toggle("dim", !keep.has(nid)));

        edgeEls.forEach((p) => {
          const on = keep.has(p.dataset.a) && keep.has(p.dataset.b);
          p.classList.toggle("hl", on);
        });
      }

      function clearHi() {
        nodeEls.forEach((g) => g.classList.remove("dim"));
        edgeEls.forEach((p) => p.classList.remove("hl"));
      }

      function showInfo(id) {
        const d = byId.get(id);

        const anc = ancestors(id);

        const chainXP = [...anc].reduce((s, x) => s + byId.get(x).exp, 0);

        const info = document.getElementById("info");

        const stt = status(d);

        let html = `<button class="btn-done ${done.has(d.id) ? "is-done" : ""}" data-act="done" data-id="${d.id}">${done.has(d.id) ? t("undone") : t("done")}</button>`;

        html += `<span class="badge b-${stt}">${bLabel[stt]}</span>`;

        html += `<h2>${dn(d)}</h2>`;

        html += `<div class="row"><span>${t("i_trader")}</span><span style="color:${TC[d.trader]}">${t(d.trader)}</span></div>`;

        html += `<div class="row"><span>${t("i_xp")}</span><span class="g">${sx(d.exp).toLocaleString("ru-RU")} XP</span></div>`;

        html += `<div class="row"><span>${t("i_lvl")}</span><span>${d.minLevel || "—"}</span></div>`;

        if (d.map) html += `<div class="row"><span>${t("i_map")}</span><span>${d.map}</span></div>`;

        html += `<div class="row"><span>${t("i_pre")}</span><span>${d.requires.length}</span></div>`;

        html += `<div class="row"><span>${t("i_ch")}</span><span>${anc.size}</span></div>`;

        html += `<div class="row"><span>${t("i_chxp")}</span><span class="g">${sx(chainXP + d.exp).toLocaleString("ru-RU")} XP</span></div>`;

        html += `<div class="row"><span>${t("i_unl")}</span><span>${(childMap.get(id) || []).length}</span></div>`;

        const pList = orderListHTML(id);

        if (pList.length > 0) {
          html += `<div class="todo">`;

          pList.forEach((p) => {
            const pd = byId.get(p);

            html += `<div class="t-row ${done.has(p) ? "tdone" : ""}">

        <input type="checkbox" ${done.has(p) ? "checked" : ""} data-act="done" data-id="${p}">

        <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${dn(pd)}</span>

      </div>`;
          });

          html += `</div>`;
        }

        document.getElementById("infoBody").innerHTML = html;

        info.style.display = "block";
      }

      function orderListHTML(id) {
        const anc = Array.from(ancestors(id));

        return anc.sort((a, b) => depth.get(a) - depth.get(b));
      }

      gNodes.addEventListener("mouseover", (e) => {
        const g = e.target.closest(".node");
        if (g && !pinned) highlight(g.dataset.id);
      });

      gNodes.addEventListener("mouseout", (e) => {
        if (!pinned && e.target.closest(".node")) clearHi();
      });

      // Robust click handler: track pointer movement to distinguish clicks from drags.

      // Use elementsFromPoint to detect node under pointer even when #info panel overlaps.

      let _clickStart = null;

      function handleNodeClick(cx, cy) {
        const infoEl = document.getElementById("info");

        const wasVis = infoEl.style.display === "block";

        if (wasVis) infoEl.style.display = "none";

        const els = document.elementsFromPoint(cx, cy);

        if (wasVis) infoEl.style.display = "block";

        const g = els.find((el) => el.closest && el.closest(".node"));

        if (!g) return;

        const nodeG = g.closest(".node");

        if (!nodeG) return;

        const id = nodeG.dataset.id;

        if (pinned === id) {
          pinned = null;
          nodeG.classList.remove("sel");
          clearHi();
          infoEl.style.display = "none";
          return;
        }

        nodeEls.forEach((n) => n.classList.remove("sel"));

        nodeG.classList.add("sel");

        pinned = id;
        highlight(id);
        showInfo(id);
      }

      document.getElementById("stage").addEventListener("pointerdown", (e) => {
        if (viewMode !== "graph") return;

        if (e.target.closest("#info")) return;

        _clickStart = { x: e.clientX, y: e.clientY, id: e.pointerId };
      });

      document.getElementById("stage").addEventListener("pointerup", (e) => {
        if (!_clickStart || _clickStart.id !== e.pointerId) return;

        if (e.target.closest("#info")) {
          _clickStart = null;
          return;
        }

        const dx = e.clientX - _clickStart.x,
          dy = e.clientY - _clickStart.y;

        const cs = _clickStart;
        _clickStart = null;

        if (Math.abs(dx) < 5 && Math.abs(dy) < 5) handleNodeClick(e.clientX, e.clientY);
      });

      document.getElementById("infoClose").onclick = () => {
        document.getElementById("info").style.display = "none";
        if (pinned) {
          nodeEls.get(pinned)?.classList.remove("sel");
          pinned = null;
          clearHi();
        }
      };

      document.getElementById("infoBody").addEventListener("click", (e) => {
        const el = e.target.closest('[data-act="done"]');
        if (!el) return;

        toggleDone(el.dataset.id);
        updateStats();
        draw();
        if (pinned) showInfo(pinned);
      });

      // ---- LIST VIEW ----

      const listEl = document.getElementById("list");

      let sortKey = "lvl",
        sortDir = 1;

      function renderList() {
        const rows = DATA.filter((d) => visible(d) && (!searchQ || matchName(d, searchQ))).sort((a, b) => {
          let va, vb;

          if (sortKey === "name") {
            va = dn(a);
            vb = dn(b);
          } else if (sortKey === "trader") {
            va = a.trader;
            vb = b.trader;
          } else if (sortKey === "lvl") {
            va = a.minLevel;
            vb = b.minLevel;
          } else if (sortKey === "xp") {
            va = a.exp;
            vb = b.exp;
          } else if (sortKey === "unlocks") {
            va = descCount.get(a.id) || 0;
            vb = descCount.get(b.id) || 0;
          } else if (sortKey === "status") {
            va = status(a);
            vb = status(b);
          }

          if (va < vb) return -1 * sortDir;

          if (va > vb) return 1 * sortDir;

          return 0;
        });

        let html = `<table class="qt"><thead><tr>

    <th width="40"></th>

    <th data-sort="name">${t("c_quest")} ${sortKey === "name" ? (sortDir > 0 ? "▲" : "▼") : ""}</th>

    <th data-sort="trader">${t("c_trader")} ${sortKey === "trader" ? (sortDir > 0 ? "▲" : "▼") : ""}</th>

    <th data-sort="lvl" class="num">${t("c_lvl")} ${sortKey === "lvl" ? (sortDir > 0 ? "▲" : "▼") : ""}</th>

    <th data-sort="xp" class="num">${t("c_xp")} ${sortKey === "xp" ? (sortDir > 0 ? "▲" : "▼") : ""}</th>

    <th data-sort="unlocks" class="num">${t("c_unlocks")} ${sortKey === "unlocks" ? (sortDir > 0 ? "▲" : "▼") : ""}</th>

    <th data-sort="status">${t("c_status")} ${sortKey === "status" ? (sortDir > 0 ? "▲" : "▼") : ""}</th>

  </tr></thead><tbody>`;

        if (!rows.length) html += `<tr><td colspan="7" class="empty">${t("listempty")}</td></tr>`;

        rows.forEach((d) => {
          const stt = status(d);

          const isDone = done.has(d.id);

          const av = available(d);

          let cls = "qr";

          if (isDone) cls += " dim";

          html += `<tr class="${cls}" data-id="${d.id}">

      <td class="cdone"><input type="checkbox" data-act="done" data-id="${d.id}" ${isDone ? "checked" : ""}></td>

      <td style="font-weight:600"><span style="display:inline-block;width:4px;height:12px;background:${TC[d.trader]};margin-right:6px"></span>${av && !isDone ? '<span style="color:var(--good)">▸</span> ' : ""}${dn(d)}</td>

      <td style="color:${TC[d.trader]}">${t(d.trader)}</td>

      <td class="num">${d.minLevel}</td>

      <td class="num">${sx(d.exp).toLocaleString("ru-RU")}</td>

      <td class="num">${descCount.get(d.id) || ""}</td>

      <td><span class="badge b-${stt}">${bLabel[stt]}</span></td>

    </tr>`;
        });

        html += `</tbody></table>`;

        listEl.innerHTML = html;
      }

      listEl.addEventListener("click", (e) => {
        const cb = e.target.closest('input[data-act="done"]');

        if (cb) {
          const st = listEl.scrollTop;
          toggleDone(cb.dataset.id);
          updateStats();
          draw();
          listEl.scrollTop = st;
          if (pinned === cb.dataset.id) showInfo(pinned);
          return;
        }

        const th = e.target.closest("th[data-sort]");

        if (th) {
          const k = th.dataset.sort;
          if (sortKey === k) sortDir *= -1;
          else {
            sortKey = k;
            sortDir = 1;
          }
          renderList();
          return;
        }

        const tr = e.target.closest(".qr");

        if (tr) {
          pinned = tr.dataset.id;
          showInfo(tr.dataset.id);
        }
      });

      // ---- RAID PLANNER ----

      const plannerEl = document.getElementById("planner");

      let activeMap = null;

      function renderPlanner() {
        const avail = DATA.filter((d) => visible(d) && !done.has(d.id));

        const maps = {};

        const global = [];

        avail.forEach((d) => {
          if (!d.map || d.map === "any" || d.map.toLowerCase() === "global" || d.map.toLowerCase() === "any") {
            global.push(d);

            return;
          }

          const mapName = d.map;

          if (!maps[mapName]) maps[mapName] = { quests: [], xp: 0 };

          maps[mapName].quests.push(d);

          maps[mapName].xp += d.exp;
        });

        const sortedMaps = Object.keys(maps)
          .map((k) => ({ name: k, ...maps[k] }))
          .sort((a, b) => b.xp - a.xp);

        // Set default active

        if (!activeMap) {
          if (sortedMaps.length > 0) activeMap = sortedMaps[0].name;
          else if (global.length > 0) activeMap = "global";
        }

        let html = `<div class="planner-layout">`;

        // LEFT SIDEBAR: MAPS

        html += `<div class="planner-sidebar">`;

        html += `<div class="side-title">${t("v_planner")}</div>`;

        if (global.length > 0) {
          const isAct = activeMap === "global" ? "active" : "";

          html += `<div class="map-btn ${isAct}" data-map="global">

      <div class="m-nm">📌 Фоновые квесты</div>

      <div class="m-st">${global.length} ${t("q")}</div>

    </div>`;
        }

        sortedMaps.forEach((m) => {
          const isAct = activeMap === m.name ? "active" : "";

          html += `<div class="map-btn ${isAct}" data-map="${m.name}">

      <div class="m-nm">${t(m.name)}</div>

      <div class="m-st">${m.quests.length} ${t("q")} · <b>${sx(m.xp).toLocaleString("ru-RU")} XP</b></div>

    </div>`;
        });

        if (sortedMaps.length === 0 && global.length === 0) {
          html += `<div style="padding:20px;color:var(--muted)">${t("listempty")}</div>`;
        }

        html += `</div>`;

        // RIGHT CONTENT

        html += `<div class="planner-content">`;

        if (activeMap === "global" && global.length > 0) {
          html += `<div class="active-map-panel">

      <div class="am-header">

        <h1>📌 Фоновые / Пассивные задачи</h1>

        <div class="am-sub">${global.length} ${t("q")}</div>

      </div>

      <div class="am-list">`;

          global.forEach((q) => {
            html += `<div class="am-quest ${!available(q) ? "dim" : ""}" data-id="${q.id}">

        <input type="checkbox" ${done.has(q.id) ? "checked" : ""} data-act="done" data-id="${q.id}">

        <div class="amq-info">

          <div class="amq-name">${dn(q)}</div>

          <div class="amq-meta"><span style="color:${TC[q.trader]}">${t(q.trader)}</span> · ${sx(q.exp).toLocaleString("ru-RU")} XP</div>

        </div>

      </div>`;
          });

          html += `</div></div>`;
        } else if (activeMap && maps[activeMap]) {
          const m = maps[activeMap];

          html += `<div class="active-map-panel">

      <div class="am-header">

        <h1>${t(activeMap)}</h1>

        <div class="am-sub">${m.quests.length} ${t("q")} · <b style="color:var(--gold)">${sx(m.xp).toLocaleString("ru-RU")} XP</b></div>

      </div>

      <div class="am-list">`;

          m.quests.forEach((q) => {
            html += `<div class="am-quest ${!available(q) ? "dim" : ""}" data-id="${q.id}">

        <input type="checkbox" ${done.has(q.id) ? "checked" : ""} data-act="done" data-id="${q.id}">

        <div class="amq-info">

          <div class="amq-name">${dn(q)}</div>

          <div class="amq-meta"><span style="color:${TC[q.trader]}">${t(q.trader)}</span> · ${sx(q.exp).toLocaleString("ru-RU")} XP</div>

        </div>

      </div>`;
          });

          html += `</div></div>`;
        }

        html += `</div></div>`;

        plannerEl.innerHTML = html;
      }

      plannerEl.addEventListener("click", (e) => {
        const btn = e.target.closest(".map-btn");

        if (btn) {
          activeMap = btn.dataset.map;
          renderPlanner();
          return;
        }

        const cb = e.target.closest('input[data-act="done"]');

        if (cb) {
          const list = plannerEl.querySelector(".am-list");
          const st = list ? list.scrollTop : 0;
          toggleDone(cb.dataset.id);
          updateStats();
          draw();
          const nl = plannerEl.querySelector(".am-list");
          if (nl) nl.scrollTop = st;
          if (pinned === cb.dataset.id) showInfo(pinned);
          return;
        }

        const row = e.target.closest(".am-quest");
        if (row && row.dataset.id) {
          pinned = row.dataset.id;
          showInfo(row.dataset.id);
        }
      });

      function draw() {
        if (viewMode === "list") renderList();
        else if (viewMode === "planner") renderPlanner();
        else render();
      }

      addEventListener("keydown", (e) => {
        if (e.key === "Escape") document.getElementById("infoClose").onclick();
      });

      // ---- pan/zoom ----

      let tx = 0,
        ty = 0,
        k = 1;
      const stage = document.getElementById("stage"),
        view = document.getElementById("view");

      const apply = () => view.setAttribute("transform", `translate(${tx},${ty}) scale(${k})`);

      function fit() {
        const r = stage.getBoundingClientRect(),
          pad = 70;
        k = Math.min((r.width - pad) / LW, (r.height - pad) / LH, 1);
        if (!isFinite(k) || k <= 0) k = 0.5;
        tx = (r.width - LW * k) / 2;
        ty = (r.height - LH * k) / 2;
        apply();
      }

      const clampK = (v) => Math.max(0.06, Math.min(4, v));

      function zoomAt(mx, my, f) {
        const nk = clampK(k * f);
        tx = mx - (mx - tx) * (nk / k);
        ty = my - (my - ty) * (nk / k);
        k = nk;
        apply();
      }

      stage.addEventListener(
        "wheel",
        (e) => {
          if (viewMode !== "graph") return;
          if (e.target.closest("#info")) return;
          e.preventDefault();
          const r = stage.getBoundingClientRect();
          zoomAt(e.clientX - r.left, e.clientY - r.top, e.deltaY < 0 ? 1.12 : 1 / 1.12);
        },
        { passive: false },
      );

      let pts = new Map(),
        panP = null,
        pinch = null;

      stage.addEventListener("pointerdown", (e) => {
        if (viewMode !== "graph") return;

        if (e.target.closest("#info")) return;

        pts.set(e.pointerId, e);

        if (pts.size === 1) {
          panP = { x: e.clientX, y: e.clientY, tx, ty };
          pinch = null;
          stage.classList.add("drag");
        } else if (pts.size === 2) {
          const p = Array.from(pts.values());
          pinch = { d: Math.hypot(p[0].clientX - p[1].clientX, p[0].clientY - p[1].clientY), k };
          panP = null;
        }
      });

      stage.addEventListener("pointermove", (e) => {
        if (!pts.has(e.pointerId)) return;
        pts.set(e.pointerId, e);

        if (pts.size === 1 && panP) {
          tx = panP.tx + (e.clientX - panP.x);
          ty = panP.ty + (e.clientY - panP.y);
          apply();
        } else if (pts.size === 2 && pinch) {
          const p = Array.from(pts.values());
          const nd = Math.hypot(p[0].clientX - p[1].clientX, p[0].clientY - p[1].clientY);

          const nk = clampK(pinch.k * (nd / pinch.d));
          const mx = (p[0].clientX + p[1].clientX) / 2,
            my = (p[0].clientY + p[1].clientY) / 2;

          const r = stage.getBoundingClientRect();
          zoomAt(mx - r.left, my - r.top, nk / k);
        }
      });

      const endPtr = (e) => {
        pts.delete(e.pointerId);
        if (pts.size === 1) {
          const p = Array.from(pts.values())[0];
          panP = { x: p.clientX, y: p.clientY, tx, ty };
          pinch = null;
        } else if (pts.size === 0) {
          panP = null;
          stage.classList.remove("drag");
        }
      };

      stage.addEventListener("pointerup", endPtr);
      stage.addEventListener("pointercancel", endPtr);

      document.getElementById("switch").addEventListener("click", (e) => {
        const b = e.target.closest("button");
        if (!b) return;

        MODE = b.dataset.mode;
        document.querySelectorAll("#switch button").forEach((x) => x.classList.toggle("on", x === b));

        updateStats();
        draw();
        if (pinned) showInfo(pinned);
      });

      document.getElementById("viewsw").addEventListener("click", (e) => {
        const b = e.target.closest("button");
        if (!b) return;

        viewMode = b.dataset.view;
        document.querySelectorAll("#viewsw button").forEach((x) => x.classList.toggle("on", x === b));

        document.body.classList.remove("listview", "plannerview");

        if (viewMode === "list") document.body.classList.add("listview");

        if (viewMode === "planner") document.body.classList.add("plannerview");

        draw();
      });

      document.getElementById("kappaBtn").addEventListener("click", () => {
        scopeKappa = !scopeKappa;

        document.getElementById("kappaBtn").classList.toggle("on", scopeKappa);
        draw();
      });

      document.getElementById("f-req").addEventListener("change", (e) => {
        F.req = e.target.checked;
        draw();
      });

      document.getElementById("f-normal").addEventListener("change", (e) => {
        F.normal = e.target.checked;
        draw();
      });

      document.getElementById("f-event").addEventListener("change", (e) => {
        F.event = e.target.checked;
        draw();
      });

      document.getElementById("minxp").addEventListener("input", (e) => {
        F.minxp = +e.target.value;
        document.getElementById("minxpv").textContent = F.minxp / 1000 + "k";
        draw();
      });

      ["f-req", "f-normal", "f-event", "links", "f-hidedone", "f-onlyavail"].forEach((id) => {
        const b = document.getElementById(id);

        if (b)
          b.onclick = () => {
            b.classList.toggle("on");

            const st = b.classList.contains("on");

            if (id === "f-req") F.req = st;
            else if (id === "f-normal") F.normal = st;
            else if (id === "f-junk") F.junk = st;
            else if (id === "f-event") F.event = st;
            else if (id === "links") document.body.classList.toggle("links", st);
            else if (id === "f-hidedone") F.hidedone = st;
            else if (id === "f-onlyavail") F.onlyavail = st;

            draw();
          };
      });

      function setLevel(v) {
        myLevel = Math.max(0, Math.min(79, Math.round(+v) || 0));
        const inp = document.getElementById("mylevel");
        if (inp) inp.value = myLevel;
        localStorage.setItem("eft_kappa_level", myLevel);
        draw();
        persistCloud();
      }
      document.getElementById("mylevel").value = myLevel;
      document.getElementById("lvlminus").onclick = () => setLevel(myLevel - 1);
      document.getElementById("lvlplus").onclick = () => setLevel(myLevel + 1);
      document.getElementById("mylevel").addEventListener("change", (e) => setLevel(e.target.value));

      function applyTheme(th) {
        if (th) document.documentElement.setAttribute("data-theme", th);
        else document.documentElement.removeAttribute("data-theme");
        document
          .querySelectorAll("#themeSw .theme-dot")
          .forEach((b) => b.classList.toggle("on", (b.dataset.theme || "") === (th || "")));
        localStorage.setItem("eft_kappa_theme", th || "");
      }
      document.querySelectorAll("#themeSw .theme-dot").forEach((b) => (b.onclick = () => applyTheme(b.dataset.theme)));
      applyTheme(localStorage.getItem("eft_kappa_theme") || "");

      const seasonBtn = document.getElementById("seasonBtn");
      seasonBtn.classList.toggle("on", seasonal);
      seasonBtn.onclick = () => {
        seasonal = !seasonal;
        localStorage.setItem("eft_kappa_seasonal", seasonal ? "1" : "0");
        seasonBtn.classList.toggle("on", seasonal);
        updateStats();
        draw();
        if (pinned) showInfo(pinned);
      };

      document.getElementById("f-hidedone").addEventListener("change", (e) => {
        F.hidedone = e.target.checked;
        draw();
      });

      document.getElementById("f-onlyavail").addEventListener("change", (e) => {
        F.onlyavail = e.target.checked;
        draw();
      });

      document.getElementById("fit").onclick = fit;

      document.getElementById("zin").onclick = () => {
        k = clampK(k * 1.3);
        apply();
      };

      document.getElementById("zout").onclick = () => {
        k = clampK(k / 1.3);
        apply();
      };

      document.getElementById("togglePanel").onclick = () => document.body.classList.add("panel-open");

      document.getElementById("panelClose").onclick = () => document.body.classList.remove("panel-open");

      const matchName = (d, q) => d.name.toLowerCase().includes(q) || (d.nameRu || "").toLowerCase().includes(q);

      const search = document.getElementById("search");

      search.addEventListener("input", () => {
        const q = search.value.trim().toLowerCase();

        searchQ = q;

        if (viewMode !== "graph") {
          draw();
          return;
        }

        nodeEls.forEach((g, id) => g.classList.toggle("dim", q && !matchName(byId.get(id), q)));
        edgeEls.forEach((p) => p.classList.remove("hl"));
      });

      search.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        const q = search.value.trim().toLowerCase();
        const hit = DATA.find((d) => matchName(d, q) && nodeEls.has(d.id));

        if (hit && nodeEls.has(hit.id)) {
          if (viewMode !== "graph") {
            document.querySelector('#viewsw button[data-view="graph"]').click();
          }

          nodeEls.get(hit.id).dispatchEvent(new MouseEvent("click", { bubbles: true }));

          const coordG = nodeEls
            .get(hit.id)
            .getAttribute("transform")
            .match(/translate\(([-\d.]+),([-\d.]+)\)/);

          const nx = +coordG[1],
            ny = +coordG[2];
          const r = stage.getBoundingClientRect();
          tx = r.width / 2 - (nx + NODE_W / 2) * k;
          ty = r.height / 2 - (ny + NODE_H / 2) * k;
          apply();
        }
      });

      // ---- SUPABASE CLOUD SYNC ----

      const SUPABASE_URL = "https://hzphxpcmppummlxuqqyp.supabase.co";

      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6cGh4cGNtcHB1bW1seHVxcXlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyMjY0NjcsImV4cCI6MjA5OTgwMjQ2N30.Vn8LlI3zQxbVTvKFioGq8CsG94kShIRx7Y20bzpXiHE";

      let sbClient = null;

      let sessionUser = null;

      if (SUPABASE_URL && SUPABASE_KEY && window.supabase) {
        sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        sbClient.auth.getSession().then(({ data: { session } }) => {
          if (session) {
            sessionUser = session.user;
            applyAuthUI();
            loadFromCloud();
          }
        });

        sbClient.auth.onAuthStateChange((_event, session) => {
          sessionUser = session?.user || null;

          applyAuthUI();

          if (sessionUser) loadFromCloud();
          else {
            done.clear();
            persist();
            draw();
          }
        });
      }

      function applyAuthUI() {
        const login = document.getElementById("btnLogin");

        const prof = document.getElementById("userProfile");

        if (sessionUser) {
          login.style.display = "none";

          prof.style.display = "flex";

          document.getElementById("userName").textContent = sessionUser.email.split("@")[0];
        } else {
          login.style.display = "block";

          prof.style.display = "none";
        }
      }

      const loginModal = document.getElementById("loginModal");

      const lgErr = document.getElementById("lgErr");

      function openLogin() {
        lgErr.textContent = "";
        lgErr.style.color = "var(--bad)";
        loginModal.style.display = "flex";
        document.getElementById("lgEmail").focus();
      }

      function closeLogin() {
        loginModal.style.display = "none";
      }

      document.getElementById("btnLogin").onclick = () => {
        if (!sbClient) {
          alert("Supabase не сконфигурирован.");
          return;
        }
        openLogin();
      };

      document.getElementById("loginClose").onclick = closeLogin;

      loginModal.addEventListener("click", (e) => {
        if (e.target === loginModal) closeLogin();
      });

      async function doPassword(mode) {
        const email = document.getElementById("lgEmail").value.trim();

        const pass = document.getElementById("lgPass").value;

        lgErr.style.color = "var(--bad)";
        lgErr.textContent = "";

        if (!email || !pass) {
          lgErr.textContent = t("lg_need");
          return;
        }

        const res =
          mode === "up"
            ? await sbClient.auth.signUp({ email, password: pass })
            : await sbClient.auth.signInWithPassword({ email, password: pass });

        if (res.error) {
          lgErr.textContent = res.error.message;
          return;
        }

        if (mode === "up" && !res.data.session) {
          lgErr.style.color = "var(--good)";
          lgErr.textContent = t("lg_confirm");
          return;
        }

        closeLogin();
      }

      document.getElementById("lgSignin").onclick = () => doPassword("in");

      document.getElementById("lgSignup").onclick = () => doPassword("up");

      document.getElementById("lgGoogle").onclick = async () => {
        const { error } = await sbClient.auth.signInWithOAuth({
          provider: "google",

          options: { redirectTo: window.location.origin + window.location.pathname },
        });

        if (error) lgErr.textContent = error.message;
      };

      document.getElementById("btnLogout").onclick = () => {
        if (sbClient) sbClient.auth.signOut();
      };

      async function loadFromCloud() {
        if (!sbClient || !sessionUser) return;

        const { data } = await sbClient.from("profiles").select("*").eq("id", sessionUser.id).single();

        if (data) {
          done.clear();
          (data.done || []).forEach((id) => done.add(id));

          if (data.mylevel !== undefined && data.mylevel !== null) {
            myLevel = data.mylevel;
            document.getElementById("mylevel").value = myLevel;
          }

          updateStats();
          draw();
        }
      }

      async function persistCloud() {
        if (!sbClient || !sessionUser) return;

        await sbClient.from("profiles").upsert({ id: sessionUser.id, done: [...done], mylevel: myLevel });
      }

      const _originalPersist = persist;

      persist = function () {
        _originalPersist();

        if (sessionUser) persistCloud();
      };

      function applyLang() {
        document.querySelectorAll("[data-t]").forEach((el) => (el.textContent = t(el.dataset.t)));

        document.querySelectorAll("[data-tph]").forEach((el) => (el.placeholder = t(el.dataset.tph)));

        document.documentElement.lang = LANG;

        bLabel.req = LANG === "ru" ? "КАППА" : "KAPPA";

        bLabel.seed = LANG === "ru" ? "КЛЮЧЕВОЙ" : "SEED";

        bLabel.junk = LANG === "ru" ? "МУСОР" : "JUNK";

        bLabel.normal = LANG === "ru" ? "ОБЫЧНЫЙ" : "NORMAL";

        bLabel.event = LANG === "ru" ? "ИВЕНТ" : "EVENT";

        updateStats();
        draw();
      }

      document.getElementById("langsw").addEventListener("click", (e) => {
        const b = e.target.closest("button");
        if (!b) return;

        LANG = b.dataset.lang;
        document.querySelectorAll("#langsw button").forEach((x) => x.classList.toggle("on", x === b));

        if (pinned) showInfo(pinned);
        applyLang();
      });

      applyLang();
    </script>
  </body>
</html>
