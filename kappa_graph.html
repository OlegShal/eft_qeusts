<meta charset="utf-8">
<title>EFT — Граф квестов Каппы</title>
<style>
  :root{
    --bg:#12130f; --bg2:#1a1c15; --panel:#1e2018; --line:#33362a;
    --text:#e8e6d9; --muted:#9a9c85; --gold:#e8c15a; --goldsoft:#7a6a2e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:"Segoe UI",Roboto,system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
  #app{display:flex;flex-direction:column;height:100%}

  header{display:flex;align-items:center;gap:18px;padding:8px 14px;background:linear-gradient(#20221a,#171912);border-bottom:1px solid var(--line);flex-wrap:wrap}
  header h1{font-size:15px;margin:0;letter-spacing:.5px;font-weight:600;white-space:nowrap}
  header h1 b{color:var(--gold)}
  .stats{display:flex;gap:16px;font-size:12px;color:var(--muted)}
  .stats b{color:var(--text);font-weight:600}
  .stats .g{color:var(--gold)}
  .spacer{flex:1}
  .ctrl{display:flex;align-items:center;gap:8px;font-size:12px}
  input[type=search]{background:var(--bg2);border:1px solid var(--line);color:var(--text);padding:6px 9px;border-radius:6px;width:190px;font-size:12px}
  input[type=search]::placeholder{color:var(--muted)}
  button{background:var(--bg2);border:1px solid var(--line);color:var(--text);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px}
  button:hover{border-color:var(--gold);color:var(--gold)}
  .toggle{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;padding:5px 10px;border:1px solid var(--goldsoft);border-radius:6px;background:rgba(232,193,90,.08)}
  .toggle input{accent-color:var(--gold)}

  #legend{display:flex;gap:6px;padding:6px 14px;background:var(--bg2);border-bottom:1px solid var(--line);flex-wrap:wrap;font-size:11px}
  .lg{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;cursor:pointer;border:1px solid transparent;user-select:none;opacity:.55}
  .lg.on{opacity:1;border-color:var(--line);background:rgba(255,255,255,.04)}
  .lg .dot{width:10px;height:10px;border-radius:50%}

  #stage{flex:1;position:relative;overflow:hidden;background:
     radial-gradient(circle at 50% 40%, #1a1c14, #0d0e0a 90%);cursor:grab}
  #stage.drag{cursor:grabbing}
  svg{width:100%;height:100%;display:block}
  #edges path{fill:none;stroke:#3a3d2e;stroke-width:1.2;opacity:.5}
  #edges path.k{stroke:var(--goldsoft);opacity:.6}
  #edges path.hl{stroke:var(--gold);opacity:1;stroke-width:2}
  .node{cursor:pointer}
  .node rect{rx:6;stroke-width:1.5}
  .node text{font-size:11px;fill:var(--text);pointer-events:none;dominant-baseline:middle}
  .node .tr{font-size:9px;fill:var(--muted)}
  .node.kappa rect{stroke:var(--gold)}
  .node:not(.kappa){opacity:.72}
  .node:not(.kappa) rect{fill:#20221a;stroke:#3d4032}
  .dim{opacity:.12 !important}
  .dim text{fill:var(--muted)}
  .node.sel rect{stroke:#fff;stroke-width:2.5}
  .hidden{display:none}

  #info{position:absolute;top:12px;right:12px;width:290px;background:rgba(24,26,19,.97);border:1px solid var(--line);border-radius:10px;padding:14px 16px;font-size:12.5px;box-shadow:0 8px 30px rgba(0,0,0,.5);display:none}
  #info h2{margin:0 0 4px;font-size:15px;line-height:1.25}
  #info .kbadge{display:inline-block;font-size:10px;color:#12130f;background:var(--gold);padding:2px 7px;border-radius:20px;font-weight:700;margin-bottom:8px}
  #info .row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed #2a2c22}
  #info .row span:first-child{color:var(--muted)}
  #info .g{color:var(--gold);font-weight:600}
  #info .close{position:absolute;top:8px;right:10px;cursor:pointer;color:var(--muted);font-size:16px}
  #info .close:hover{color:var(--text)}
  #hint{position:absolute;bottom:10px;left:14px;font-size:11px;color:var(--muted);pointer-events:none}
</style>

<div id="app">
  <header>
    <h1>EFT · Граф квестов <b>Каппы</b></h1>
    <div class="stats" id="stats"></div>
    <div class="spacer"></div>
    <label class="toggle"><input type="checkbox" id="onlyKappa"> Только Каппа</label>
    <div class="ctrl"><input type="search" id="search" placeholder="Поиск квеста…" autocomplete="off"></div>
    <div class="ctrl">
      <button id="fit">Вписать</button>
      <button id="zoomin">＋</button>
      <button id="zoomout">－</button>
    </div>
  </header>
  <div id="legend"></div>
  <div id="stage">
    <svg id="svg"><g id="view"><g id="edges"></g><g id="nodes"></g></g></svg>
    <div id="info"><span class="close" id="infoClose">✕</span><div id="infoBody"></div></div>
    <div id="hint">Колесо — зум · тащить — панорама · наведи/кликни квест — подсветка цепочки пререквизитов</div>
  </div>
</div>

DATA.forEach(d=>d.requires.forEach(r=>{ if(childrenMap.has(r)) childrenMap.get(r).push(d.id); }));
function ancestors(id){const s=new Set(),st=[id];while(st.length){const c=st.pop();byId.get(c).requires.forEach(r=>{if(!s.has(r)){s.add(r);st.push(r);}});}return s;}
function descendants(id){const s=new Set(),st=[id];while(st.length){const c=st.pop();(childrenMap.get(c)||[]).forEach(r=>{if(!s.has(r)){s.add(r);st.push(r);}});}return s;}

// ---- legend / trader filter ----
const traders = [...new Set(DATA.map(d=>d.trader))].sort();
const traderOn = new Set(traders);
const legend = document.getElementById('legend');
traders.forEach(t=>{
  const el=document.createElement('div'); el.className='lg on';
  el.innerHTML=`<span class="dot" style="background:${TRADER_COLORS[t]||'#888'}"></span>${t}`;
  el.onclick=()=>{ if(traderOn.has(t)){traderOn.delete(t);el.classList.remove('on');} else {traderOn.add(t);el.classList.add('on');} applyVisibility(); };
  legend.appendChild(el);
});

// ---- LAYOUT (layered DAG + barycenter) ----
let onlyKappa=false;
function layout(){
  const nodes = DATA.filter(d=> !onlyKappa || d.kappa);
  const vis = new Set(nodes.map(d=>d.id));
  const reqOf = id => byId.get(id).requires.filter(r=>vis.has(r));

  // longest-path depth
  const depth=new Map();
  function dep(id){ if(depth.has(id))return depth.get(id); depth.set(id,0);
    let m=0; reqOf(id).forEach(r=>m=Math.max(m,dep(r)+1)); depth.set(id,m); return m; }
  nodes.forEach(n=>dep(n.id));

  const layers=[]; nodes.forEach(n=>{const d=depth.get(n.id);(layers[d]||(layers[d]=[])).push(n.id);});
  // init order: trader then level then name
  layers.forEach(L=>L.sort((a,b)=>{const A=byId.get(a),B=byId.get(b);return (A.trader).localeCompare(B.trader)||A.minLevel-B.minLevel||A.name.localeCompare(B.name);}));
  const pos=new Map(); const reindex=()=>layers.forEach(L=>L.forEach((id,i)=>pos.set(id,i)));
  reindex();
  const childVis = id => (childrenMap.get(id)||[]).filter(c=>vis.has(c));
  // barycenter sweeps
  for(let it=0;it<6;it++){
    const down=it%2===0;
    for(let li=0; li<layers.length; li++){
      const L=layers[li];
      L.sort((a,b)=>{
        const na = down?reqOf(a):childVis(a), nb=down?reqOf(b):childVis(b);
        const ba = na.length? na.reduce((s,x)=>s+(pos.get(x)||0),0)/na.length : pos.get(a);
        const bb = nb.length? nb.reduce((s,x)=>s+(pos.get(x)||0),0)/nb.length : pos.get(b);
        return ba-bb;
      });
      L.forEach((id,i)=>pos.set(id,i));
    }
  }
  const maxRows = Math.max(...layers.map(L=>L.length));
  const coords=new Map();
  layers.forEach((L,d)=>{
    const off=(maxRows-L.length)/2;
    L.forEach((id,i)=>coords.set(id,{x:d*COL, y:(i+off)*ROW}));
  });
  return {coords, width:layers.length*COL, height:maxRows*ROW};
}

// ---- RENDER ----
const gNodes=document.getElementById('nodes'), gEdges=document.getElementById('edges');
const nodeEls=new Map(), edgeEls=[];
function render(){
  gNodes.innerHTML=''; gEdges.innerHTML=''; nodeEls.clear(); edgeEls.length=0;
  const {coords,width,height}=layout();
  LAYOUT_W=width; LAYOUT_H=height;

  // edges
  DATA.forEach(d=>{
    if(!coords.has(d.id))return;
    d.requires.forEach(r=>{
      if(!coords.has(r))return;
      const a=coords.get(r), b=coords.get(d.id);
      const x1=a.x+NODE_W, y1=a.y+NODE_H/2, x2=b.x, y2=b.y+NODE_H/2;
      const mx=(x1+x2)/2;
      const p=document.createElementNS(SVGNS,'path');
      p.setAttribute('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
      if(byId.get(r).kappa && d.kappa) p.classList.add('k');
      p.dataset.a=r; p.dataset.b=d.id;
      gEdges.appendChild(p); edgeEls.push(p);
    });
  });
  // nodes
  DATA.forEach(d=>{
    if(!coords.has(d.id))return;
    const c=coords.get(d.id);
    const g=document.createElementNS(SVGNS,'g');
    g.setAttribute('class','node'+(d.kappa?' kappa':'')); g.setAttribute('transform',`translate(${c.x},${c.y})`);
    g.dataset.id=d.id;
    const col=TRADER_COLORS[d.trader]||'#888';
    const rect=document.createElementNS(SVGNS,'rect');
    rect.setAttribute('width',NODE_W);rect.setAttribute('height',NODE_H);rect.setAttribute('rx',6);
    rect.setAttribute('fill',d.kappa? hexA(col,.20):'#20221a');
    if(d.kappa) rect.setAttribute('stroke','var(--gold)'); else rect.setAttribute('stroke','#3d4032');
    g.appendChild(rect);
    const bar=document.createElementNS(SVGNS,'rect');
    bar.setAttribute('width',4);bar.setAttribute('height',NODE_H);bar.setAttribute('fill',col);
    g.appendChild(bar);
    const t1=document.createElementNS(SVGNS,'text');
    t1.setAttribute('x',10);t1.setAttribute('y',15);
    t1.textContent = d.name.length>26? d.name.slice(0,25)+'…':d.name;
    g.appendChild(t1);
    const t2=document.createElementNS(SVGNS,'text');
    t2.setAttribute('class','tr');t2.setAttribute('x',10);t2.setAttribute('y',29);
    t2.textContent=`${d.trader} · ${d.exp.toLocaleString('ru-RU')} XP`;
    g.appendChild(t2);
    gNodes.appendChild(g); nodeEls.set(d.id,g);
  });
  applyVisibility();
  fit();
}
function hexA(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}

// ---- visibility (trader filter) ----
function applyVisibility(){
  nodeEls.forEach((g,id)=>{ g.classList.toggle('hidden', !traderOn.has(byId.get(id).trader)); });
  edgeEls.forEach(p=>{ const hide=!traderOn.has(byId.get(p.dataset.a).trader)||!traderOn.has(byId.get(p.dataset.b).trader); p.classList.toggle('hidden',hide); });
}

// ---- highlight ----
let pinned=null;
function highlight(id){
  const anc=ancestors(id), desc=descendants(id);
  const keep=new Set([id,...anc,...desc]);
  nodeEls.forEach((g,nid)=>g.classList.toggle('dim',!keep.has(nid)));
  edgeEls.forEach(p=>{
    const on = keep.has(p.dataset.a)&&keep.has(p.dataset.b) && (p.dataset.b===id||anc.has(p.dataset.b)||p.dataset.a===id||(desc.has(p.dataset.a)&&desc.has(p.dataset.b))||anc.has(p.dataset.a));
    p.classList.toggle('hl',on);
    p.classList.toggle('dim',!(keep.has(p.dataset.a)&&keep.has(p.dataset.b)));
  });
}
function clearHighlight(){ nodeEls.forEach(g=>g.classList.remove('dim')); edgeEls.forEach(p=>{p.classList.remove('hl');p.classList.remove('dim');}); }

function showInfo(id){
  const d=byId.get(id);
  const anc=ancestors(id);
  const chainXP=[...anc].reduce((s,x)=>s+byId.get(x).exp,0);
  const info=document.getElementById('info');
  document.getElementById('infoBody').innerHTML=
    (d.kappa?'<span class="kbadge">НУЖЕН ДЛЯ КАППЫ</span>':'')+
    `<h2>${d.name}</h2>`+
    `<div class="row"><span>Торговец</span><span style="color:${TRADER_COLORS[d.trader]}">${d.trader}</span></div>`+
    `<div class="row"><span>Экспа</span><span class="g">${d.exp.toLocaleString('ru-RU')} XP</span></div>`+
    `<div class="row"><span>Мин. уровень</span><span>${d.minLevel||'—'}</span></div>`+
    (d.map?`<div class="row"><span>Карта</span><span>${d.map}</span></div>`:'')+
    `<div class="row"><span>Прямых пререквизитов</span><span>${d.requires.length}</span></div>`+
    `<div class="row"><span>Всего в цепочке</span><span>${anc.size}</span></div>`+
    `<div class="row"><span>Экспа всей цепочки</span><span class="g">${(chainXP+d.exp).toLocaleString('ru-RU')} XP</span></div>`+
    `<div class="row"><span>Открывает далее</span><span>${(childrenMap.get(id)||[]).length}</span></div>`;
  info.style.display='block';
}

// ---- events ----
gNodes.addEventListener('mouseover',e=>{const g=e.target.closest('.node');if(g&&!pinned)highlight(g.dataset.id);});
gNodes.addEventListener('mouseout',e=>{if(!pinned&&e.target.closest('.node'))clearHighlight();});
gNodes.addEventListener('click',e=>{const g=e.target.closest('.node');if(!g)return;const id=g.dataset.id;
  if(pinned===id){pinned=null;g.classList.remove('sel');clearHighlight();document.getElementById('info').style.display='none';return;}
  nodeEls.forEach(n=>n.classList.remove('sel')); g.classList.add('sel');
  pinned=id; highlight(id); showInfo(id);
});
document.getElementById('infoClose').onclick=()=>{document.getElementById('info').style.display='none';if(pinned){nodeEls.get(pinned)?.classList.remove('sel');pinned=null;clearHighlight();}};

// ---- pan / zoom ----
let LAYOUT_W=0,LAYOUT_H=0, tx=0,ty=0,k=1;
const stage=document.getElementById('stage'), view=document.getElementById('view');
function apply(){view.setAttribute('transform',`translate(${tx},${ty}) scale(${k})`);}
function fit(){
  const r=stage.getBoundingClientRect(); const pad=60;
  k=Math.min((r.width-pad)/LAYOUT_W,(r.height-pad)/LAYOUT_H, 1.2);
  if(!isFinite(k)||k<=0)k=.4;
  tx=(r.width-LAYOUT_W*k)/2; ty=(r.height-LAYOUT_H*k)/2; apply();
}
stage.addEventListener('wheel',e=>{e.preventDefault();const r=stage.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
  const f=e.deltaY<0?1.12:1/1.12;const nk=Math.max(.08,Math.min(3,k*f));
  tx=mx-(mx-tx)*(nk/k); ty=my-(my-ty)*(nk/k); k=nk; apply();
},{passive:false});
let drag=null;
stage.addEventListener('mousedown',e=>{if(e.target.closest('.node'))return;drag={x:e.clientX,y:e.clientY,tx,ty};stage.classList.add('drag');});
window.addEventListener('mousemove',e=>{if(!drag)return;tx=drag.tx+(e.clientX-drag.x);ty=drag.ty+(e.clientY-drag.y);apply();});
window.addEventListener('mouseup',()=>{drag=null;stage.classList.remove('drag');});
document.getElementById('fit').onclick=fit;
document.getElementById('zoomin').onclick=()=>{k=Math.min(3,k*1.2);apply();};
document.getElementById('zoomout').onclick=()=>{k=Math.max(.08,k/1.2);apply();};

// ---- only-kappa toggle ----
document.getElementById('onlyKappa').onchange=e=>{onlyKappa=e.target.checked;pinned=null;render();};

// ---- search ----
const search=document.getElementById('search');
search.addEventListener('input',()=>{
  const q=search.value.trim().toLowerCase();
  if(!q){clearHighlight();return;}
  let found=null;
  nodeEls.forEach((g,id)=>{const hit=byId.get(id).name.toLowerCase().includes(q);g.classList.toggle('dim',!hit);if(hit&&!found)found=id;});
  edgeEls.forEach(p=>p.classList.add('dim'));
  if(found){const c=nodeEls.get(found);}
});
search.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const q=search.value.trim().toLowerCase();
  const hit=DATA.find(d=>d.name.toLowerCase().includes(q));
  if(hit&&nodeEls.has(hit.id)){nodeEls.get(hit.id).dispatchEvent(new MouseEvent('click',{bubbles:true}));
    const r=stage.getBoundingClientRect();const coordG=nodeEls.get(hit.id).getAttribute('transform').match(/translate\(([-\d.]+),([-\d.]+)\)/);
    const nx=+coordG[1],ny=+coordG[2];tx=r.width/2-(nx+NODE_W/2)*k;ty=r.height/2-(ny+NODE_H/2)*k;apply();}
});

render();
</script>
